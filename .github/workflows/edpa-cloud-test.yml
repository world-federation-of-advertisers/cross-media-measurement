name: Run EDP Aggregator Cloud Test

run-name: Run EDP Aggregator Cloud Test [${{ inputs.environment }}]

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub-managed environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - head

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bazel
        uses: world-federation-of-advertisers/actions/setup-bazel@390a9ea948eef416333f8c257ef6116552a42d23 # v2.6.0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}
          token_format: 'id_token'
          id_token_audience: ${{ vars.REQUISITION_FETCHER_ENDPOINT }}

      - name: Write auth.bazelrc
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          cat << EOF > auth.bazelrc
          build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          EOF

      - name: Write ~/.bazelrc
        env:
          KINGDOM_PUBLIC_API_TARGET: ${{ vars.KINGDOM_PUBLIC_API_TARGET }}
          MC_NAME: ${{ vars.MC_NAME }}
          MC_API_KEY: ${{ secrets.MC_API_KEY }}
          AUTH_ID_TOKEN: ${{ steps.auth.outputs.id_token }}
          REQUISITION_FETCHER_ENDPOINT: ${{ vars.REQUISITION_FETCHER_ENDPOINT }}
          STORAGE_BUCKET: secure-computation-storage-${{ inputs.environment }}-bucket
          MODEL_LINE: ${{ vars.MODEL_LINE_NAME }}

        run: |
          cat << EOF > ~/.bazelrc
          common --config=ci
          build --define kingdom_public_api_target=$KINGDOM_PUBLIC_API_TARGET
          build --define mc_name=$MC_NAME
          build --define mc_api_key=$MC_API_KEY
          build --define auth_id_token=$AUTH_ID_TOKEN
          build --define requisition_fetcher_endpoint=$REQUISITION_FETCHER_ENDPOINT
          build --define storage_bucket=$STORAGE_BUCKET
          build --define model_line=$MODEL_LINE
          test --test_output=streamed
          test --test_timeout=3600
          EOF

      # Reduce chance of disconnection from the Build Event Service.
      - name: Set TCP keepalive
        run: sudo sysctl -w net.ipv4.tcp_keepalive_time=60

      # The edpa_meta AWS KMS client authenticates via web-identity federation using a Google
      # (accounts.google.com) OIDC token. The AWS role EDPA_META_AWS_ROLE_ARN
      # (GcpSyntheticDataKmsRole) trusts the CI service account's numeric subject
      # (accounts.google.com:sub) and has no audience condition. Mint a fresh id_token for the CI
      # service account here (right before the test, for maximum validity headroom) and point
      # AWS_WEB_IDENTITY_TOKEN_FILE at it.
      - name: Mint Google web-identity token for AWS
        id: aws_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}
          token_format: 'id_token'
          # Google->AWS: the aud must be an audience the AWS accounts.google.com OIDC provider
          # accepts (the edpa_meta identity), NOT sts.amazonaws.com. The CI SA's sub is in the
          # GcpSyntheticDataKmsRole trust.
          id_token_audience: ${{ vars.EDPA_META_AWS_AUDIENCE }}
          create_credentials_file: false
          export_environment_variables: false

      - name: Write AWS web-identity token file
        env:
          AWS_WEB_IDENTITY_ID_TOKEN: ${{ steps.aws_auth.outputs.id_token }}
        run: |
          token_file="$RUNNER_TEMP/aws-web-identity-token"
          printf '%s' "$AWS_WEB_IDENTITY_ID_TOKEN" > "$token_file"
          echo "AWS_WEB_IDENTITY_TOKEN_FILE=$token_file" >> "$GITHUB_ENV"

      - name: Run tests
        id: run-tests
        env:
          MODEL_LINE_NAME: ${{ vars.MODEL_LINE_NAME }}
          PIPELINED_DATA_PROVIDER: dataProviders/${{ fromJson(vars.DATA_PROVIDER_RESOURCE_IDS).edp7 }}
          EDPA_PUBLIC_API_TARGET: ${{ vars.METADATA_STORAGE_PUBLIC_API_TARGET }}
          # edpa_meta publisher AWS KMS settings, used to (re)generate its labeled impressions
          # in-test. The runner must also produce AWS_WEB_IDENTITY_TOKEN_FILE (AWS web-identity
          # token); it is forwarded to the test below.
          EDPA_META_KEK_URI: ${{ vars.EDPA_META_KEK_URI }}
          EDPA_META_AWS_ROLE_ARN: ${{ vars.EDPA_META_AWS_ROLE_ARN }}
          EDPA_META_AWS_REGION: ${{ vars.EDPA_META_AWS_REGION }}
        run: |
          # Storage settings live in the committed per-env tfvars (single source of truth after
          # #4168/#4227); read them here so this workflow never drifts from what Terraform deployed.
          TFVARS="src/main/terraform/gcloud/cmms/envs/${{ inputs.environment }}.tfvars"
          tfvar() { grep -E "^$1 " "$TFVARS" | head -1 | cut -d'"' -f2; }
          export RAW_IMPRESSIONS_BUCKET="$(tfvar secure_computation_storage_bucket_name)"
          export EDPA_CONFIG_STORAGE_BUCKET="$(tfvar edpa_config_files_bucket_name)"
          export EVENT_TEMPLATE_DESCRIPTOR_BLOB_URI="$(tfvar results_fulfiller_event_proto_descriptor_blob_uri)"
          export EVENT_TEMPLATE_TYPE="$(tfvar results_fulfiller_event_template_type_name)"
          vid_models_bucket="$(tfvar vid_models_storage_bucket_name)"
          export MEMOIZED_MODEL_BLOB_URI="gs://${vid_models_bucket}/edp7/memoized_model"
          export NON_MEMOIZED_MODEL_BLOB_URI="gs://${vid_models_bucket}/edp7/hashonly_model"
          # Derive the ModelSuite from the ModelLine resource name.
          export MODEL_SUITE="${MODEL_LINE_NAME%/modelLines/*}"
          bazel test \
          --test_env=GOOGLE_APPLICATION_CREDENTIALS \
          --test_env=GOOGLE_CLOUD_PROJECT \
          --test_env=MODEL_SUITE \
          --test_env=PIPELINED_DATA_PROVIDER \
          --test_env=EDPA_CONFIG_STORAGE_BUCKET \
          --test_env=EVENT_TEMPLATE_DESCRIPTOR_BLOB_URI \
          --test_env=EVENT_TEMPLATE_TYPE \
          --test_env=MEMOIZED_MODEL_BLOB_URI \
          --test_env=NON_MEMOIZED_MODEL_BLOB_URI \
          --test_env=RAW_IMPRESSIONS_BUCKET \
          --test_env=EDPA_PUBLIC_API_TARGET \
          --test_env=EDPA_META_KEK_URI \
          --test_env=EDPA_META_AWS_ROLE_ARN \
          --test_env=EDPA_META_AWS_REGION \
          --test_env=AWS_WEB_IDENTITY_TOKEN_FILE \
          //src/test/kotlin/org/wfanet/measurement/integration/k8s:EdpAggregatorCorrectnessTest

      - name: Upload Bazel testlogs
        continue-on-error: true
        uses: world-federation-of-advertisers/actions/bazel-upload-testlogs@390a9ea948eef416333f8c257ef6116552a42d23 # v2.6.0
        if: failure() && steps.run-tests.outcome == 'failure'
          
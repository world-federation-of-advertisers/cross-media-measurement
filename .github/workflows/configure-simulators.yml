name: "Configure EDP simulators"

run-name: >-
  Configure EDP simulators [${{ inputs.environment }}] |
  apply=${{ inputs.apply }},
  image-tag=${{ inputs.existing-image-tag }}

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      image-tag:
        description: "Tag of container images"
        type: string
        required: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub-managed environment"
        required: true
        type: choice
        options:
        - dev
        - qa
        - head
      image-tag:
        description: "Tag of container images"
        type: string
        required: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        default: false

permissions:
  contents: read

env:
  KUSTOMIZATION_PATH: "k8s/cmms"
  KUBECTL_APPLYSET: true  

jobs:
  update-simulators:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Authenticate to Google Cloud. This will export some environment
    # variables, including GCLOUD_PROJECT.
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GKE_CONFIG_SERVICE_ACCOUNT }}

    - name: Install gcloud
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

    - name: Export GCLOUD_PROJECT_NUMBER
      run: echo "GCLOUD_PROJECT_NUMBER=$(gcloud projects describe $GCLOUD_PROJECT --format="value(projectNumber)")" >> $GITHUB_ENV

    - name: Write auth.bazelrc
      env:
        BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        cat << EOF > auth.bazelrc
        build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
        EOF

    - name: Read simulator EDP config
      id: simulator-edps
      env:
        CONFIG_PATH: .github/env-configs/${{ inputs.environment }}/simulator_edps.json
      run: |
        for key in edp1_name edp1_cert_name edp2_name edp2_cert_name \
                   edp3_name edp3_cert_name edp4_name edp4_cert_name \
                   edp5_name edp5_cert_name edp6_name edp6_cert_name; do
          value=$(jq -r --arg k "$key" '.[$k]' "$CONFIG_PATH")
          if [ -z "$value" ] || [ "$value" = "null" ]; then
            echo "Missing key '$key' in $CONFIG_PATH" >&2
            exit 1
          fi
          echo "${key}=${value}" >> "$GITHUB_OUTPUT"
        done

    - name: Write ~/.bazelrc
      env:
        IMAGE_TAG: ${{ inputs.image-tag }}
        KINGDOM_PUBLIC_API_TARGET: ${{ vars.KINGDOM_PUBLIC_API_TARGET }}
        WORKER1_PUBLIC_API_TARGET: ${{ vars.WORKER1_PUBLIC_API_TARGET }}
        WORKER2_PUBLIC_API_TARGET: ${{ vars.WORKER2_PUBLIC_API_TARGET }}
        AGGREGATOR_PUBLIC_API_TARGET: ${{ vars.AGGREGATOR_PUBLIC_API_TARGET }}
        MC_NAME: ${{ vars.MC_NAME }}
        EDP1_NAME: ${{ steps.simulator-edps.outputs.edp1_name }}
        EDP1_CERT_NAME: ${{ steps.simulator-edps.outputs.edp1_cert_name }}
        EDP2_NAME: ${{ steps.simulator-edps.outputs.edp2_name }}
        EDP2_CERT_NAME: ${{ steps.simulator-edps.outputs.edp2_cert_name }}
        EDP3_NAME: ${{ steps.simulator-edps.outputs.edp3_name }}
        EDP3_CERT_NAME: ${{ steps.simulator-edps.outputs.edp3_cert_name }}
        EDP4_NAME: ${{ steps.simulator-edps.outputs.edp4_name }}
        EDP4_CERT_NAME: ${{ steps.simulator-edps.outputs.edp4_cert_name }}
        EDP5_NAME: ${{ steps.simulator-edps.outputs.edp5_name }}
        EDP5_CERT_NAME: ${{ steps.simulator-edps.outputs.edp5_cert_name }}
        EDP6_NAME: ${{ steps.simulator-edps.outputs.edp6_name }}
        EDP6_CERT_NAME: ${{ steps.simulator-edps.outputs.edp6_cert_name }}
        GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
      run: |
        cat << EOF > ~/.bazelrc
        common --config=ci
        build --remote_download_outputs=toplevel  # Need build output.
        common --config=ghcr
        build --define "image_tag=$IMAGE_TAG"
        build --define "google_cloud_project=$GCLOUD_PROJECT"
        build --define "google_cloud_project_number=$GCLOUD_PROJECT_NUMBER"
        build --define "key_ring_location=$GCLOUD_REGION"
        build --define "kingdom_public_api_target=$KINGDOM_PUBLIC_API_TARGET"
        build --define "worker1_id=worker1"
        build --define "worker1_public_api_target=$WORKER1_PUBLIC_API_TARGET"
        build --define "worker2_id=worker2"
        build --define "worker2_public_api_target=$WORKER2_PUBLIC_API_TARGET"
        build --define "aggregator_id=aggregator"
        build --define "aggregator_public_api_target=$AGGREGATOR_PUBLIC_API_TARGET"
        build --define "mc_name=$MC_NAME"
        build --define "edp1_name=$EDP1_NAME"
        build --define "edp1_cert_name=$EDP1_CERT_NAME"
        build --define "edp2_name=$EDP2_NAME"
        build --define "edp2_cert_name=$EDP2_CERT_NAME"
        build --define "edp3_name=$EDP3_NAME"
        build --define "edp3_cert_name=$EDP3_CERT_NAME"
        build --define "edp4_name=$EDP4_NAME"
        build --define "edp4_cert_name=$EDP4_CERT_NAME"
        build --define "edp5_name=$EDP5_NAME"
        build --define "edp5_cert_name=$EDP5_CERT_NAME"
        build --define "edp6_name=$EDP6_NAME"
        build --define "edp6_cert_name=$EDP6_CERT_NAME"
        EOF

    - name: Export BAZEL_BIN
      run: echo "BAZEL_BIN=$(bazelisk info bazel-bin)" >> $GITHUB_ENV

    - name: Get GKE cluster credentials
      uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
      with:
        cluster_name: simulators
        location: ${{ vars.GCLOUD_ZONE }}

    - name: Configure metrics
      uses: ./.github/actions/configure-metrics
      if: ${{ inputs.apply }}

    - name: Generate archives
      run: >
        bazelisk build 
        //src/main/k8s/dev:edp_simulators.tar
        //src/main/k8s/testing/secretfiles:kustomization.tar

    - name: Make Kustomization dir
      run: mkdir -p "$KUSTOMIZATION_PATH"
    - name: Extract Kustomization archive
      run: >
        tar -xf "$BAZEL_BIN/src/main/k8s/dev/edp_simulators.tar"
        -C "$KUSTOMIZATION_PATH"

    - name: Extract secret files archive
      run: >
        tar -xf "$BAZEL_BIN/src/main/k8s/testing/secretfiles/kustomization.tar"
        -C "$KUSTOMIZATION_PATH"

    - name: Export KUSTOMIZE_PATH
      run: echo "KUSTOMIZE_PATH=$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_simulators" >> $GITHUB_ENV

    # Run kubectl diff, treating the command as succeeded even if the exit
    # code is 1 as kubectl uses this code to indicate there's a diff.
    - name: kubectl diff
      id: kubectl-diff
      run: kubectl diff -k "$KUSTOMIZE_PATH" || (( $? == 1 ))

    - name: kubectl apply
      if: ${{ inputs.apply }}
      run: kubectl apply -k "$KUSTOMIZE_PATH" --namespace=default --prune --applyset=configmaps/kubectl-edp-sims

    - name: Wait for rollout
      if: ${{ inputs.apply }}
      run: |
        for deployment in $(kubectl get deployments -l app.kubernetes.io/component=simulator -o name); do
          kubectl rollout status "$deployment" --timeout=5m
        done

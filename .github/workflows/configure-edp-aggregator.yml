name: "Configure Edp Aggregator Services"

run-name: >-
  Configure Edp Aggregator Services [${{ inputs.environment }}] |
  apply=${{ inputs.apply }},
  image-tag=${{ inputs.image-tag }}

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      image-tag:
        description: "Tag of container images"
        type: string
        required: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub-managed environment"
        required: true
        type: choice
        options:
        - dev
        - qa
        - head
      image-tag:
        description: "Tag of container images"
        type: string
        required: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        default: false

permissions:
  contents: read

env:
  KUSTOMIZATION_PATH: "k8s/edp_aggregator"
  KUBECTL_APPLYSET: true  

jobs:
  update-edp-aggregator-services:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GKE_CONFIG_SERVICE_ACCOUNT }}

    - name: Write auth.bazelrc
      env:
        BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        cat << EOF > auth.bazelrc
        build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
        EOF

    - name: Write ~/.bazelrc
      env:
        IMAGE_TAG: ${{ inputs.image-tag }}
        SPANNER_INSTANCE: ${{ vars.SPANNER_INSTANCE }}
        GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
      run: |
        cat << EOF > ~/.bazelrc
        common --config=ci
        build --remote_download_outputs=toplevel
        common --config=ghcr
        build --define "image_tag=$IMAGE_TAG"
        build --define "google_cloud_project=$GCLOUD_PROJECT"
        build --define "spanner_instance=$SPANNER_INSTANCE"
        EOF

    - name: Set up Bazel
      uses: world-federation-of-advertisers/actions/setup-bazel@390a9ea948eef416333f8c257ef6116552a42d23 # v2.6.0

    - name: Export BAZEL_BIN
      run: echo "BAZEL_BIN=$(bazelisk info bazel-bin)" >> $GITHUB_ENV

    - name: Get GKE cluster credentials
      uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
      with:
        cluster_name: kingdom
        location: ${{ vars.GCLOUD_ZONE }}

    - name: Generate archives
      run: >
        bazelisk build
        //src/main/k8s/dev:edp_aggregator.tar
        //src/main/k8s/testing/secretfiles:edp_aggregator_tls_files.tar
        //src/main/k8s/testing/secretfiles:edp7_tls_files.tar
        //src/main/k8s/testing/secretfiles:edp_aggregator_trusted_certs.pem

    - name: Make Kustomization dir
      run: mkdir -p "$KUSTOMIZATION_PATH"

    - name: Extract Kustomization archive
      run: >
        tar -xf "$BAZEL_BIN/src/main/k8s/dev/edp_aggregator.tar"
        -C "$KUSTOMIZATION_PATH"

    - name: Extract tls files archive
      run: >
        tar -xf "$BAZEL_BIN/src/main/k8s/testing/secretfiles/edp_aggregator_tls_files.tar"
        -C "$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_aggregator_tls"

    - name: Extract edp7 tls files archive
      run: >
        tar -xf "$BAZEL_BIN/src/main/k8s/testing/secretfiles/edp7_tls_files.tar"
        -C "$KUSTOMIZATION_PATH/src/main/k8s/dev/edp7_tls"

    - name: Copy trusted certs
      run: >
        cp "$BAZEL_BIN/src/main/k8s/testing/secretfiles/edp_aggregator_trusted_certs.pem"
        "$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_aggregator_config/trusted_certs.pem"

    - name: Copy kingdom root cert
      run: >
        cp src/main/k8s/testing/secretfiles/kingdom_root.pem
        "$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_aggregator_config/kingdom_root.pem"

    - name: Write sync-event-group-activities config (edp7)
      env:
        EVENT_GROUP_ACTIVITY_SYNC_EDP7_CONFIG_CONTENT: ${{ vars.EVENT_GROUP_ACTIVITY_SYNC_EDP7_CONFIG_CONTENT }}
      run: |
        if [ -z "$EVENT_GROUP_ACTIVITY_SYNC_EDP7_CONFIG_CONTENT" ]; then
          echo "vars.EVENT_GROUP_ACTIVITY_SYNC_EDP7_CONFIG_CONTENT is empty for environment ${{ inputs.environment }}" >&2
          exit 1
        fi
        printf '%s' "$EVENT_GROUP_ACTIVITY_SYNC_EDP7_CONFIG_CONTENT" > \
          "$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_aggregator_config/event-group-activity-sync-config-edp7.textproto"

    - name: Export KUSTOMIZE_PATH
      run: echo "KUSTOMIZE_PATH=$KUSTOMIZATION_PATH/src/main/k8s/dev/edp_aggregator" >> $GITHUB_ENV

    - name: kubectl diff
      id: kubectl-diff
      run: kubectl diff -k "$KUSTOMIZE_PATH" || (( $? == 1 ))

    - name: kubectl apply
      if: ${{ inputs.apply }}
      run: kubectl apply -k "$KUSTOMIZE_PATH" --namespace=default --prune --applyset=configmaps/kubectl-edpa

    - name: Wait for rollout
      if: ${{ inputs.apply }}
      run: |
        for deployment in $(kubectl get deployments -l app.kubernetes.io/component=edp-aggregator -o name); do
          kubectl rollout status "$deployment" --timeout=5m
        done

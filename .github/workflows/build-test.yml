name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-18.04
    steps:
      - name: Check out revision
        uses: actions/checkout@v2

      - name: Bazel build and test
        uses: world-federation-of-advertisers/actions/bazel-build-test@v1
        with:
          workspace-path: .
          build-options: |
            --host_platform=//build/platforms:ubuntu_18_04
            --define=container_registry=
            --define=image_repo_prefix=
            --define=gcloud_spanner_project=
            --define=gcloud_spanner_instance=
            --define=gcloud_storage_project=
            --define=gcloud_storage_bucket=
            --define=gcloud_bigquery_table=

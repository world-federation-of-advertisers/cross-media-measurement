name: Run Dashboard Isolation Test

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub-managed environment"
        required: true
        type: choice
        options:
          - dev
          - qa

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        edp:
          - name: meta
            resource_id: J3-pzhqS9Lo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bazel
        uses: world-federation-of-advertisers/actions/setup-bazel@a9407321ceb8da9912face58a8139603678c869d # v2.5.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: edp-${{ matrix.edp.name }}-dashboard@${{ vars.GOOGLE_CLOUD_PROJECT }}.iam.gserviceaccount.com

      - name: Write auth.bazelrc
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          cat << EOF > auth.bazelrc
          build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          EOF

      - name: Write ~/.bazelrc
        run: |
          cat << EOF > ~/.bazelrc
          common --config=ci
          test --test_output=streamed
          test --test_timeout=300
          EOF

      - name: Run Dashboard Isolation Tests
        id: run-tests
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          BIGQUERY_REGION: ${{ vars.BIGQUERY_REGION }}
          EDP_NAME: ${{ matrix.edp.name }}
          EDP_RESOURCE_ID: ${{ matrix.edp.resource_id }}
        run: |
          bazel test \
          --test_env=GOOGLE_APPLICATION_CREDENTIALS \
          --test_env=GOOGLE_CLOUD_PROJECT \
          --test_env=BIGQUERY_REGION \
          --test_env=EDP_NAME \
          --test_env=EDP_RESOURCE_ID \
          //src/test/kotlin/org/wfanet/measurement/integration/k8s:DashboardIsolationTest

      - name: Upload Bazel testlogs
        continue-on-error: true
        uses: world-federation-of-advertisers/actions/bazel-upload-testlogs@a9407321ceb8da9912face58a8139603678c869d # v2.5.0
        if: failure() && steps.run-tests.outcome == 'failure'

name: Claude Code Review

on:
  pull_request:
    types: [review_requested] # This handles both initial requests AND re-requests

permissions:
  contents: read
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  review:
    # Restrict job to run ONLY if claude is requested AND the author is an allowed role
    if: >
      github.event.requested_reviewer.login == 'claude' &&
      (github.event.pull_request.author_association == 'MEMBER' || 
       github.event.pull_request.author_association == 'OWNER' || 
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: /code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

name: Update CMMS

run-name: >-
  Update CMMS [${{ inputs.environment }}] |
  apply=${{ inputs.apply }},
  test=${{ inputs.run-tests }},
  image-tag=${{ inputs.existing-image-tag }}

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      run-tests:
        description: "Run tests"
        type: boolean
        default: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub-managed environment"
        required: true
        type: choice
        options:
        - dev
        - qa
        - head
      run-tests:
        description: "Run tests"
        type: boolean
        default: true
      apply:
        description: "Apply the new configuration"
        type: boolean
        default: false
      existing-image-tag:
        description: "Tag of existing published images (skips push)"
        type: string

permissions:
  contents: read

jobs:
  publish-images:
    uses: ./.github/workflows/maybe-push-images.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      existing-image-tag: ${{ inputs.existing-image-tag }}
      use-release-key: ${{ inputs.environment == 'qa' && github.actor == 'github-actions[bot]' }}

  scan-images:
    uses: ./.github/workflows/scan-images.yml
    needs: [publish-images]
    if: inputs.existing-image-tag == ''
    permissions:
      contents: read
      security-events: write
    with:
      container-registry: ghcr.io
      image-repo-prefix: ${{ github.repository_owner }}
      image-tag: ${{ needs.publish-images.outputs.image-tag }}

  terraform:
    uses: ./.github/workflows/terraform-cmms-v2.yml
    needs: [publish-images]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}
      image-tag: ${{ needs.publish-images.outputs.image-tag }}

  update-kingdom:
    uses: ./.github/workflows/configure-kingdom.yml
    needs: [publish-images, terraform]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-population-fulfiller:
    uses: ./.github/workflows/configure-population-fulfiller.yml
    needs: [publish-images, update-kingdom]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-secure-computation:
    uses: ./.github/workflows/configure-secure-computation-control-plane.yml
    needs: [ publish-images, terraform, update-kingdom]
    secrets: inherit
    permissions:
      contents: read
      id-token: write    
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-aggregator-duchy:
    uses: ./.github/workflows/configure-duchy.yml
    needs: [publish-images, terraform]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      duchy-name: aggregator
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-worker1-duchy:
    uses: ./.github/workflows/configure-duchy.yml
    needs: [publish-images, terraform]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      duchy-name: worker1
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-worker2-duchy:
    uses: ./.github/workflows/configure-duchy.yml
    needs: [publish-images, terraform]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      duchy-name: worker2
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-simulators:
    uses: ./.github/workflows/configure-simulators.yml
    needs: [publish-images, terraform]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  update-edp-aggregator-service:
    uses: ./.github/workflows/configure-edp-aggregator.yml
    needs: [publish-images, terraform, update-kingdom]
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  # Update the Reporting system.
  #
  # This isn't technically part of the CMMS, but we do it here for simplicity.
  update-reporting-v2:
    uses: ./.github/workflows/configure-reporting-v2.yml
    secrets: inherit
    needs: [ publish-images, terraform ]
    permissions:
      contents: read
      id-token: write
    with:
      image-tag: ${{ needs.publish-images.outputs.image-tag }}
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}

  run-tests:
    if: inputs.run-tests
    needs: [
      update-kingdom,
      update-population-fulfiller,
      update-aggregator-duchy,
      update-worker1-duchy,
      update-worker2-duchy,
      update-simulators,
      update-reporting-v2,
      update-secure-computation,
      update-edp-aggregator-service
    ]
    uses: ./.github/workflows/run-k8s-tests.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}

  run-edpa-cloud-test:
    if: inputs.run-tests
    needs: [
      update-kingdom,
      update-population-fulfiller,
      update-aggregator-duchy,
      update-worker1-duchy,
      update-worker2-duchy,
      update-simulators,
      update-reporting-v2,
      update-secure-computation,
      update-edp-aggregator-service
    ]
    uses: ./.github/workflows/edpa-cloud-test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      environment: ${{ inputs.environment }}

  run-dashboard-isolation-test:
    if: inputs.run-tests
    needs: [terraform, run-tests, run-edpa-cloud-test]
    uses: ./.github/workflows/dashboard-isolation-test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      environment: ${{ inputs.environment }}

  run-dashboard-compliance-check:
    if: inputs.run-tests
    needs: [terraform, run-tests, run-edpa-cloud-test]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bazel
        uses: world-federation-of-advertisers/actions/setup-bazel@a9407321ceb8da9912face58a8139603678c869d # v2.5.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - name: Write auth.bazelrc
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          cat << EOF > auth.bazelrc
          build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          EOF

      - name: Write ~/.bazelrc
        run: |
          cat << EOF > ~/.bazelrc
          common --config=ci
          EOF

      - name: Run Compliance Check
        env:
          DASHBOARD_EDP_CONFIG: ${{ vars.DASHBOARD_EDP_CONFIG }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          BIGQUERY_REGION: ${{ vars.BIGQUERY_REGION }}
        run: |
          EDP_ARGS=$(echo "$DASHBOARD_EDP_CONFIG" | jq -r '.[] | "--edp=\(.name):\(.resource_id)"' | tr '\n' ' ')
          bazel run //src/main/kotlin/org/wfanet/measurement/edpaggregator/deploy/gcloud/dashboard/tools:DashboardComplianceCheck -- \
            --impersonate-service-account="dashboard-compliance@$GOOGLE_CLOUD_PROJECT.iam.gserviceaccount.com" \
            --project="$GOOGLE_CLOUD_PROJECT" \
            --region="$BIGQUERY_REGION" \
            $EDP_ARGS

  send-slack-notification:
    uses: ./.github/workflows/slack-nightly-build-notification.yml
    needs: [ publish-images, run-tests, run-edpa-cloud-test, run-dashboard-isolation-test, run-dashboard-compliance-check, update-secure-computation, scan-images ]
    secrets: inherit
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/nightly/') && github.actor == 'github-actions[bot]' }}
    with:
      nightly-build-tag: ${{ github.ref_name }}
      successfully-deployed: ${{ needs.publish-images.result == 'success' && needs.run-tests.result == 'success' && needs.run-edpa-cloud-test.result == 'success' && needs.run-dashboard-isolation-test.result == 'success' && needs.run-dashboard-compliance-check.result == 'success' && needs.update-secure-computation.result == 'success' && needs.scan-images.result == 'success' }}

name: Attach artifacts to release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  attach-artifacts-to-release:
    name: Attach artifacts to release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bazel
        uses: world-federation-of-advertisers/actions/setup-bazel@390a9ea948eef416333f8c257ef6116552a42d23 # v2.6.0

      - name: Write auth.bazelrc
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          cat << EOF > auth.bazelrc
          build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          EOF

      - name: Write ~/.bazelrc
        run: |
          cat << EOF > ~/.bazelrc
          common --config=ci
          build --remote_download_all
          EOF

      - name: Build CLI uber jars
        run: >
          bazel build
          //src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools:MeasurementSystem_deploy.jar
          //src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools:EncryptionPublicKeys_deploy.jar
          //src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools:EventTemplateValidator_deploy.jar
          //src/main/kotlin/org/wfanet/measurement/reporting/service/api/v2alpha/tools:Reporting_deploy.jar
          //src/main/kotlin/org/wfanet/measurement/access/deploy/tools:Access_deploy.jar
          //src/main/kotlin/org/wfanet/measurement/kingdom/deploy/tools:ModelRepository_deploy.jar

      - name: Build CLI pyzips
        run: >
          bazel build
          //src/main/python/wfa/measurement/reporting/postprocessing/tools:log_processor_pyzip

      - name: Build reporting API specs
        run: |
          bazel build //src/main/proto/wfa/measurement/reporting/v2alpha:exposed_openapi_specs
          bazel cquery //src/main/proto/wfa/measurement/reporting/v2alpha:exposed_openapi_specs --output files \
            | grep "^bazel-out" \
            | tar -czf reporting_api_specs.tar.gz --transform='s|^.*/wfa/measurement/||' -T -
          echo "Tar content is:"
          tar -tf reporting_api_specs.tar.gz

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.0.2'

      - name: Authenticate to Google Cloud for image signing
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.IMAGE_SIGNING_RELEASE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.IMAGE_SIGNING_RELEASE_SA }}

      - name: Sign and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KMS_KEY_RESOURCE_NAME: "${{ vars.IMAGE_SIGNING_RELEASE_KEY_RESOURCE_NAME }}"
        run: |
          set -euo pipefail
          artifacts=(
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools/MeasurementSystem_deploy.jar
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools/EncryptionPublicKeys_deploy.jar
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/api/v2alpha/tools/EventTemplateValidator_deploy.jar
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/reporting/service/api/v2alpha/tools/Reporting_deploy.jar
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/access/deploy/tools/Access_deploy.jar
            ./bazel-bin/src/main/kotlin/org/wfanet/measurement/kingdom/deploy/tools/ModelRepository_deploy.jar
            ./bazel-bin/src/main/python/wfa/measurement/reporting/postprocessing/tools/log_processor.zip
            reporting_api_specs.tar.gz
          )

          echo "Signing artifacts:"
          for artifact in "${artifacts[@]}"; do
            cosign sign-blob --tlog-upload=false --key="gcpkms://${KMS_KEY_RESOURCE_NAME}" --bundle="${artifact}.sigstore.json" "${artifact}"
          done

          echo "Attaching artifacts to release:"
          artifacts_to_upload=()
          for artifact in "${artifacts[@]}"; do
            artifacts_to_upload+=("${artifact}" "${artifact}.sigstore.json")
          done
          gh release upload "${{ github.event.release.tag_name }}" "${artifacts_to_upload[@]}" --clobber
name: Test generate relnotes

on:
  # DO_NOT_SUBMIT: remove pull_request event
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    name: Generate relnotes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }

      - name: Generate highlights
        id: generate-highlights
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          # DO_NOT_SUBMIT: use parameter
          MILESTONE: v0.5.25
        run: |
          set -euo pipefail
          
          # Build a JSON array of strings: "<title>. See #<number>"
          notes_json_array=$(gh issue list --milestone "${MILESTONE}" \
            --search 'type:"Feature request" state:closed' \
            --json number,title \
            --jq 'map("\(.title). See #\(.number)")')

          jq . <<< "${notes_json_array}"

          printf "json=%s\n" "$(jq -c . <<< ${notes_json_array})" >> "$GITHUB_OUTPUT"

      - name: Fetch PRs data
        id: fetch-prs-data
        env:
          GH_TOKEN: ${{ github.token }}
          # DO_NOT_SUBMIT: sha of nightly/20250728.1
          STARTING_COMMIT: "d18f4e63a0bbc1d478a27f6e77e3cedabc6fb8f5"
        run: |
          python - <<'PY'
          import os
          import re
          import json
          import subprocess
          import sys

          STARTING_COMMIT = os.getenv("STARTING_COMMIT")

          def run(cmd, input_text=None):
              return subprocess.run(
                  cmd, check=True, text=True, stdout=subprocess.PIPE, input=input_text
              ).stdout

          def fetch_issue_data(issue_number: int) -> tuple[str, str]:
              out = run([
                  "gh", "api",
                  "-H", "Accept: application/vnd.github+json",
                  "-H", "X-GitHub-Api-Version: 2022-11-28",
                  f"/repos/world-federation-of-advertisers/cross-media-measurement/issues/{issue_number}",
              ])
              data = json.loads(out)

              t = data.get("type") or {}
              issue_type = t.get("name", "_NO_TYPE_")
              issue_title = data.get("title")

              return issue_type, issue_title

          # Get PR titles (subjects)
          log_out = run(["git", "--no-pager", "log", "--format=%s", f"{STARTING_COMMIT}..HEAD"])
          pr_titles = [line for line in log_out.splitlines() if line]

          output = []
          for pr_title in pr_titles:
              print(f"Processing: {pr_title}")

              m = re.search(r"\(#(\d+)\)$", pr_title)
              if not m:
                  print(f"No PR number: {pr_title}")
                  continue

              pr_number = int(m.group(1))

              response = run(["gh", "pr", "view", str(pr_number), "--json", "body,author"])
              pr_json = json.loads(response)

              trailers_text = run(
                  ["git", "interpret-trailers", "--trim-empty", "--parse"],
                  input_text="\n" + pr_json["body"],
              )

              pr_output = {}
              pr_output["pr_id"] = pr_number
              pr_output["pr_title"] = pr_title
              pr_output["pr_author"] = pr_json["author"]["login"]

              for line in trailers_text.splitlines():
                  m2 = re.match(r'^([^:]+):\s(.*)$', line)
                  key, value = m2.group(1), m2.group(2)
                  if key == "Issue":
                      if re.fullmatch(r"#\d+", value):
                          issue_number = int(value[1:])
                          issue_type, issue_title = fetch_issue_data(issue_number)
                          pr_output.setdefault("issues",[]).append({"id":issue_number, "type":issue_type, "title":issue_title})
                  elif key in ("RELNOTES", "BREAKING-CHANGE"):
                      pr_output.setdefault(key.lower().replace("-", "_"), []).append(value)

              output.append(pr_output)
              print(json.dumps(pr_output))

          json_output=json.dumps(output)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f"json={json_output}", file=f)
          PY

      - name: Print debug data
        env:
          JSON: ${{ steps.fetch-prs-data.outputs.json }}
        run: |
          python - <<'PY'
          import os, json
          data = json.loads(os.environ["JSON"])
          print(json.dumps(data, indent=2))
          PY

      - name: Generate issues addressed
        id: generate-issues-addressed
        env:
          JSON: ${{ steps.fetch-prs-data.outputs.json }}
        run: |
          python - <<'PY'
          import os, json

          pr_data = json.loads(os.environ["JSON"])

          items = []
          seen = set()

          for pr in pr_data:
              for issue in pr.get("issues", []):
                  if issue["type"] == "Bug":
                      title = issue["title"].rstrip('.')
                      ref = issue["id"]
                      note = f"{title}. See #{ref}"
                      if note not in seen:
                          seen.add(note)
                          items.append(note)

          json_output=json.dumps(items)
          print(json_output)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f"json={json_output}", file=f)
          PY

      - name: Generate potentially requiring action
        id: generate-potentially-requiring-action
        env:
          JSON: ${{ steps.fetch-prs-data.outputs.json }}
        run: |
          python - <<'PY'
          import os, json

          def _compute_note_refs(pr):
              # Prefer issue ids; fall back to the PR number if no issues
              refs = [f"#{issue['id']}" for issue in pr.get("issues", [])]
              if not refs:
                  refs = [f"#{pr['pr_id']}"]
              return " ".join(refs)

          pr_data = json.loads(os.environ["JSON"])
          items = []

          for pr in pr_data:
              note_refs = _compute_note_refs(pr)
              for line in pr.get("relnotes", []) + pr.get("breaking_change", []):
                  title = line.rstrip('.')
                  items.append(f"{title}. See {note_refs}")
          
          json_output=json.dumps(items)
          print(json_output)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f"json={json_output}", file=f)          
          PY

      - name: Generate what's changed
        id: generate-whats-changed
        env:
          JSON: ${{ steps.fetch-prs-data.outputs.json }}
        run: |
          python - <<'PY'
          import os, json

          pr_data = json.loads(os.environ["JSON"])
          items = []

          for pr in pr_data:
              note = f"{pr[pr_title]} by @{pr[pr_author]}"
              items.append(note)
          
          json_output=json.dumps(items)
          print(json_output)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f"json={json_output}", file=f)          
          PY


      - name: Get milestone url
        id: generate-milestone-url
        shell: bash
        env: 
          GH_TOKEN: ${{ github.token }}
          # DO_NOT_SUBMIT: use parameter
          MILESTONE: v0.5.25
        run: |
          url=$(gh api "/repos/world-federation-of-advertisers/cross-media-measurement/milestones?state=all&per_page=100" --paginate --jq ".[] | select(.title==\"$MILESTONE\") | .html_url")
          echo "URL for milestone ${MILESTONE} is ${url}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Print release notes
        shell: bash
        env:
          HIGHLIGHTS: ${{ steps.generate-highlights.outputs.json }}
          ISSUES_ADDRESSED: ${{ steps.generate-issues-addressed.outputs.json }}
          POTENTIALLY_REQUIRING_ACTION: ${{ steps.generate-potentially-requiring-action.outputs.json }}
          WHATS_CHANGED: ${{ steps.generate-whats-changed.outputs.json }}
          MILESTONE_URL: ${{ steps.generate-milestone-url.outputs.url}}
          # DO_NOT_SUBMIT: use parameter
          TAG_NAME: "v0.5.24"
          # DO_NOT_SUBMIT: use parameter
          PREVIOUS_TAG_NAME: "v0.5.25"
        run: |
          print_section() {
            local title=$1
            local json_array=$2
            echo
            echo "## ${title}"
            jq -r '.[] | "* \(.)"' <<<"${json_array}"
          }

          echo "See the [corresponding milestone](${MILESTONE_URL}) for this release."
          print_section "Highlights" "${HIGHLIGHTS}"
          print_section "Issues Addressed" "${ISSUES_ADDRESSED}"
          print_section "Potentially Requiring Action" "${POTENTIALLY_REQUIRING_ACTION}"
          print_section "What's Changed" "${WHATS_CHANGED}"
          echo
          echo "**Full Changelog**: https://github.com/world-federation-of-advertisers/cross-media-measurement/compare/${PREVIOUS_TAG_NAME}...${TAG_NAME}"

      - name: Scan commits
        shell: bash
        if: false
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # DO_NOT_SUBMIT: sha of nightly/20250728.1
          STARTING_COMMIT: "d18f4e63a0bbc1d478a27f6e77e3cedabc6fb8f5"
        run: |
          set -euo pipefail

          populate_milestone_highlights() {
            declare -n out=$1
            declare -r milestone=$2
            # Assumes issue titles are single-line.
            readarray -t out < <(
              gh issue list --milestone "${milestone}" \
                --search 'type:"Feature request" state:closed' \
                --json number,title \
                --jq '.[] | "\(.title). See #\(.number)"'
            )
          }

          highlights=()
          breaking_changes=()
          issues_addressed=()
          
          # DO_NOT_SUBMIT: parameter for milestone
          populate_milestone_highlights highlights "v0.5.25"

          readarray -d '' -t pr_titles < <(git log --format='%s' "${STARTING_COMMIT}..HEAD")
          for pr_title in "{pr_titles[@]}"; do 
            echo "=============="
            echo "Processing: $pr_title"
            echo "=============="
            if [[ ! $pr_title =~ \(#([0-9]+)\)$ ]]; then
              echo "No PR number: $pr_title"
              continue
            fi

            pr_number="${BASH_REMATCH[1]}"
            pr_body="$(gh pr view ${pr_number} --repo ${REPO} --json body -q .body)"
            echo "Body:"
            echo "${pr_body}"

            issue_numbers=()
            trailers=$(printf "\n%s" "${pr_body}" | git interpret-trailers --trim-empty --parse)

            echo "-------------------"
            echo "Trailers:"

            # DO_NOT_SUBMIT: i think we don't want to do anything extra for handling cases like this (no blank line before trailers): https://github.com/world-federation-of-advertisers/cross-media-measurement/pull/2845

            for trailer in ${trailers}; do
              # DO_NOT_SUBMIT: code duplication (regex) when splitting the trailers again for relnotes and breaking changes
              if [[ "${trailer}" =~ ^([^:]+):[[:space:]](.*)$ ]]; then
                key="${BASH_REMATCH[1]}"
                value="${BASH_REMATCH[2]}"
                echo "$key -> $value"
                # DO_NOT_SUBMIT: TODO: avoid values that are links instead of "#123", like in this PR https://github.com/world-federation-of-advertisers/cross-media-measurement/pull/2776
                if [[ ${key} == "Issue" ]] && [[ "${value}" =~ ^#[0-9]+$ ]]; then
                  issue_numbers+=(${value#\#})
                fi
              fi
            done

            echo "-------------------"
            echo "Processing issues:"

            # Generate issues addressed section (issues with type=bug)

            # DO_NOT_SUBMIT: TODO: prevent 1 issue N PRs showing multiple times in the issues addressed section.
            for issue_number in "${issue_numbers[@]}"; do
              # DO_NOT_SUBMIT: only one request (title + type)?
              issue_type=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${REPO}/issues/${issue_number}" | jq -r '(.type // {"name": "_NO_TYPE_"}) | .name')
              echo "Processing issue: ${issue_number}, type=${issue_type}"
              # DO_NOT_SUBMIT: replace "_NO_TYPE_" evaluation to the name of the type "Bug"
              if [[ "${issue_type}" == "Bug" ]]; then
                issue_title=$(gh issue view "${issue_number}" --json title -q .title)
                # DO_NOT_SUBMIT: remove PR number (used for debugging)
                note="${issue_title%.}. See #${issue_number}"
                echo "Adding note for issues addressed: ${note}"
                issues_addressed+=("${note}")
              fi
            done

            # Generate breaking changes section

            echo "-------------------"
            echo "Processing relnotes and breaking changes:"
            
            reference=""
            if ((${#issue_numbers[@]})); then
              for n in "${issue_numbers[@]}"; do
                reference+="myIssue#${n} "
              done
              reference="${reference% }"
            else
              reference="myPR#${pr_number}"
            fi

            for trailer in ${trailers}; do
              if [[ "${trailer}" =~ ^([^:]+):[[:space:]](.*)$ ]]; then
                key="${BASH_REMATCH[1]}"
                value="${BASH_REMATCH[2]}"
                note="${value%.}. See ${reference}"
                case "${key}" in
                  RELNOTES)
                    echo "Adding note for RELNOTES: ${note}"
                    breaking_changes+=("[Highlight] ${note}")
                    ;;
                  BREAKING-CHANGE)
                    echo "Adding note for BREAKING-CHANGE: ${note}"
                    breaking_changes+=("[Breaking change] ${note}")
                    ;;
                  *)
                    :
                    ;;
                esac
              fi
            done
          done

          echo "========== SUMMARY =========="
          echo
          render_bullets() {
            local -n _arr=$1   # bash nameref
            if ((${#_arr[@]})); then
              for x in "${_arr[@]}"; do printf -- '- %s\n' "$x"; done
            else
              printf '(none)\n'
            fi
          }

          echo "Highlights:"
          render_bullets highlights
          echo
          echo "Potentially requiring action"
          render_bullets breaking_changes
          echo
          echo "Issues addressed"
          readarray -t unique_issues_addressed < <(printf "%s\n" "${issues_addressed[@]}" | sort -u)
          render_bullets unique_issues_addressed
          

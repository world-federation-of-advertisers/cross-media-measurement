name: Check PR title follows Conventional Commits

on:
  pull_request:
    branches:
      - main
      - 'releases/**'

jobs:
  check-pr-title:
    runs-on: ubuntu-22.04
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"

          # Adapted regex from: https://docs.github.com/en/enterprise-cloud@latest/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets/creating-rulesets-for-a-repository#enforce-conventional-commits
          REGEX='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([[:alnum:]._-]+\))?(!)?: .+$'

          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "Error: PR title must follow Conventional Commits:"
            echo "    ${REGEX}"
            echo "Example:"
            echo "    feat: Log exception info when BasicReport post-processing failed"
            exit 1
          fi
syntax = "proto3";

package wfa.measurement.internal.reporting.v2;

import "wfa/measurement/internal/reporting/v2/reporting_set.proto";

option java_package = "org.wfanet.measurement.internal.reporting.v2";
option java_multiple_files = true;

// Internal service for persistence of ReportingSet entities.
service ReportingSets {
  rpc CreateReportingSet(CreateReportingSetRequest) returns (ReportingSet);

  // Returns the `ReportingSet` that represents the request's Campaign Group if
  // an equivalent one already exists for the `MeasurementConsumer`, or creates
  // a new one if it does not.
  //
  // Two Campaign Groups are equivalent if they represent the same set of
  // `EventGroup`s. The synthesized Campaign Group has no filter, so only
  // filter-less Campaign Groups are eligible for reuse (see `reporting_set`).
  //
  // Used to materialize the synthesized Campaign Group for a custom-group
  // BasicReport. The read and the insert happen in a single serializable
  // transaction, so concurrent and retried callers converge on a single
  // ReportingSet rather than minting duplicates.
  rpc GetOrCreateCampaignGroupReportingSet(
      GetOrCreateCampaignGroupReportingSetRequest) returns (ReportingSet);

  rpc BatchGetReportingSets(BatchGetReportingSetsRequest)
      returns (BatchGetReportingSetsResponse);

  rpc StreamReportingSets(StreamReportingSetsRequest)
      returns (stream ReportingSet);
}

message CreateReportingSetRequest {
  ReportingSet reporting_set = 1;
  string external_reporting_set_id = 2;
}

message GetOrCreateCampaignGroupReportingSetRequest {
  // The `ReportingSet` representing the Campaign Group to reuse-or-create.
  //
  // Must be a valid Campaign Group: a primitive `ReportingSet` that references
  // itself as its own Campaign Group (`external_campaign_group_id` ==
  // `external_reporting_set_id`). Since the synthesized Campaign Group is the
  // union of the custom groups' `EventGroup`s, it additionally has no filter;
  // an existing Campaign Group is reused only if it represents the same
  // `EventGroup` set and likewise has no filter.
  ReportingSet reporting_set = 1;

  // Resource ID to assign if a new `ReportingSet` is inserted. Unused when an
  // equivalent Campaign Group already exists.
  string external_reporting_set_id = 2;
}

message BatchGetReportingSetsRequest {
  // `MeasurementConsumer` ID from the CMMS public API.
  string cmms_measurement_consumer_id = 1;

  // Maximum is 1000.
  repeated string external_reporting_set_ids = 2;
}

message BatchGetReportingSetsResponse {
  repeated ReportingSet reporting_sets = 1;
}

message StreamReportingSetsRequest {
  message Filter {
    // `MeasurementConsumer` ID from the CMMS public API. Required.
    string cmms_measurement_consumer_id = 1;
    // Skips to results with a resource id greater than this.
    string external_reporting_set_id_after = 2;
    string external_campaign_group_id = 3;
  }
  Filter filter = 1;

  int32 limit = 2;
}

syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionMetadataBatchFileProto";

// Internal representation of a RawImpressionMetadataBatchFile.
message RawImpressionMetadataBatchFile {
  string data_provider_resource_id = 1;
  string batch_resource_id = 2;
  string file_resource_id = 3;

  string blob_uri = 4;

  google.protobuf.Timestamp create_time = 5;
  google.protobuf.Timestamp update_time = 6;
  google.protobuf.Timestamp delete_time = 7;
}

syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

import "google/protobuf/timestamp.proto";
import "google/type/interval.proto";
import "wfa/measurement/internal/edpaggregator/raw_impression_upload.proto";
import "wfa/measurement/internal/edpaggregator/raw_impression_upload_state.proto";

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionUploadServiceProto";

// Service for managing RawImpressionUpload resources.
service RawImpressionUploadService {
  // Creates a new RawImpressionUpload.
  rpc CreateRawImpressionUpload(CreateRawImpressionUploadRequest)
      returns (RawImpressionUpload);

  // Retrieves a specific RawImpressionUpload.
  rpc GetRawImpressionUpload(GetRawImpressionUploadRequest)
      returns (RawImpressionUpload);

  // Lists RawImpressionUpload entries for a data provider.
  rpc ListRawImpressionUploads(ListRawImpressionUploadsRequest)
      returns (ListRawImpressionUploadsResponse);
}

// Request message for CreateRawImpressionUpload.
message CreateRawImpressionUploadRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // The RawImpressionUpload to create.
  RawImpressionUpload raw_impression_upload = 2;

  // A request ID provided by the client to ensure idempotency.
  string request_id = 3;
}

// Request message for GetRawImpressionUpload.
message GetRawImpressionUploadRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // The unique identifier of the upload.
  string raw_impression_upload_resource_id = 2;
}

// Request message for ListRawImpressionUploads.
message ListRawImpressionUploadsRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // The maximum number of results to return.
  //
  // If unspecified, at most 50 results will be returned.
  // The maximum value is 100; values above this will be
  // coerced to the maximum value.
  int32 page_size = 2;

  // Page token from a previous list call.
  ListRawImpressionUploadsPageToken page_token = 3;

  // Filter for narrowing results.
  message Filter {
    // Filter to resources whose state is in this set. Empty matches all states.
    repeated RawImpressionUploadState state_in = 1;

    // Filter for resources whose create_time falls within this
    // interval. Start and end are both optional: omitting start
    // returns resources created before end, omitting end returns
    // resources created after start.
    google.type.Interval create_time_in = 2;
  }
  Filter filter = 4;
}

// Response message for ListRawImpressionUploads.
message ListRawImpressionUploadsResponse {
  // The list of RawImpressionUpload entries.
  repeated RawImpressionUpload raw_impression_uploads = 1;

  // A token to retrieve the next page of results.
  ListRawImpressionUploadsPageToken next_page_token = 2;
}

// Page token for ListRawImpressionUploads.
message ListRawImpressionUploadsPageToken {
  message After {
    // The create time of the last entry in the previous page.
    google.protobuf.Timestamp create_time = 1;

    // The upload ID of the last entry in the previous page.
    string raw_impression_upload_resource_id = 2;
  }
  After after = 1;
}

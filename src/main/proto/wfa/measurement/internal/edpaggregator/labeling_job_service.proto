syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

import "google/protobuf/timestamp.proto";
import "google/type/interval.proto";
import "wfa/measurement/internal/edpaggregator/labeling_job.proto";
import "wfa/measurement/internal/edpaggregator/labeling_state.proto";

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "LabelingJobServiceProto";

// Service for managing `LabelingJob` resources, which track
// per-shard processing state for Phase 2 (VID labeling) of
// a raw impression upload.
service LabelingJobService {
  // Creates a new `LabelingJob`.
  rpc CreateLabelingJob(CreateLabelingJobRequest) returns (LabelingJob);

  // Creates multiple `LabelingJob` resources in a single
  // request.
  rpc BatchCreateLabelingJobs(BatchCreateLabelingJobsRequest)
      returns (BatchCreateLabelingJobsResponse);

  // Retrieves a specific `LabelingJob`.
  rpc GetLabelingJob(GetLabelingJobRequest) returns (LabelingJob);

  // Lists `LabelingJob` resources.
  rpc ListLabelingJobs(ListLabelingJobsRequest)
      returns (ListLabelingJobsResponse);

  // Marks a `LabelingJob` as `SUCCEEDED`. Throws
  // FAILED_PRECONDITION if state is not CREATED or FAILED.
  rpc MarkLabelingJobSucceeded(MarkLabelingJobSucceededRequest)
      returns (MarkLabelingJobSucceededResponse);

  // Marks a `LabelingJob` as `FAILED`. Throws
  // FAILED_PRECONDITION if state is not CREATED or FAILED.
  rpc MarkLabelingJobFailed(MarkLabelingJobFailedRequest) returns (LabelingJob);
}

// Request message for CreateLabelingJob.
message CreateLabelingJobRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // The LabelingJob to create.
  LabelingJob labeling_job = 3;

  // A request ID provided by the client to ensure idempotency.
  string request_id = 4;
}

// Request message for BatchCreateLabelingJobs.
message BatchCreateLabelingJobsRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // Individual create requests. Maximum 50 per batch.
  repeated CreateLabelingJobRequest requests = 3;
}

// Response message for BatchCreateLabelingJobs.
message BatchCreateLabelingJobsResponse {
  // The created labeling jobs.
  repeated LabelingJob labeling_jobs = 1;
}

// Request message for GetLabelingJob.
message GetLabelingJobRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // Resource ID of this job.
  string labeling_job_resource_id = 3;
}

// Request message for ListLabelingJobs.
message ListLabelingJobsRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // The maximum number of results to return.
  //
  // If unspecified, at most 50 results will be returned.
  // The maximum value is 100; values above this will be
  // coerced to the maximum value.
  int32 page_size = 3;

  // Page token from a previous list call.
  ListLabelingJobsPageToken page_token = 4;

  // Filter for narrowing results.
  message Filter {
    // Filter by processing state.
    LabelingState state = 1;

    // Filter for resources whose create_time falls within
    // this interval.
    google.type.Interval create_time_interval = 2;

    // Filter by CMMS model line resource name.
    string cmms_model_line = 3;
  }
  Filter filter = 5;
}

// Response message for ListLabelingJobs.
message ListLabelingJobsResponse {
  // The list of labeling jobs matching the request.
  repeated LabelingJob labeling_jobs = 1;

  // A token to retrieve the next page of results.
  ListLabelingJobsPageToken next_page_token = 2;
}

// Page token for ListLabelingJobs.
message ListLabelingJobsPageToken {
  message After {
    google.protobuf.Timestamp create_time = 1;
    string labeling_job_resource_id = 2;
  }
  After after = 1;
}

// Request message for MarkLabelingJobSucceeded.
message MarkLabelingJobSucceededRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // Resource ID of this job.
  string labeling_job_resource_id = 3;

  // Entity tag for optimistic concurrency control.
  string etag = 4;
}

// Response message for MarkLabelingJobSucceeded.
message MarkLabelingJobSucceededResponse {
  // The updated LabelingJob.
  LabelingJob labeling_job = 1;

  // Whether this was the last shard to complete for the
  // (upload, model line).
  bool is_last_shard = 2;
}

// Request message for MarkLabelingJobFailed.
message MarkLabelingJobFailedRequest {
  // Resource ID of the DataProvider.
  string data_provider_resource_id = 1;

  // Resource ID of the parent upload.
  string raw_impression_upload_resource_id = 2;

  // Resource ID of this job.
  string labeling_job_resource_id = 3;

  // Entity tag for optimistic concurrency control.
  string etag = 4;

  // Human-readable detail about the failure.
  string error_message = 5;
}

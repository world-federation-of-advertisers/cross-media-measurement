syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionUploadStateProto";

// Denormalized pipeline state for a RawImpressionUpload, rolled up from
// child model line states.
enum RawImpressionUploadState {
  // Default, unspecified state. Should not be used.
  RAW_IMPRESSION_UPLOAD_STATE_UNSPECIFIED = 0;
  // The upload was created but model lines are not processing yet.
  RAW_IMPRESSION_UPLOAD_STATE_CREATED = 1;
  // At least one model line is still processing.
  RAW_IMPRESSION_UPLOAD_STATE_ACTIVE = 2;
  // All model lines completed successfully.
  RAW_IMPRESSION_UPLOAD_STATE_COMPLETED = 3;
  // At least one model line failed.
  RAW_IMPRESSION_UPLOAD_STATE_FAILED = 4;
}

syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionUploadProto";

// Internal representation of a RawImpressionUpload.
//
// One row per EDP impression-upload event. The EDP completes uploading raw
// impressions and writes a "done" blob, which triggers the
// VidLabelingDispatcher. All downstream pipeline state cascades from here.
message RawImpressionUpload {
  // Resource ID of the DataProvider that owns this upload.
  string data_provider_resource_id = 1;

  // Unique identifier for this upload.
  string raw_impression_upload_id = 2;

  // The timestamp when this upload was created.
  google.protobuf.Timestamp create_time = 3;

  // The timestamp when this upload was last updated.
  google.protobuf.Timestamp update_time = 4;
}

syntax = "proto3";

package wfa.measurement.internal.edpaggregator;

import "google/protobuf/timestamp.proto";
import "google/type/interval.proto";
import "wfa/measurement/internal/edpaggregator/impression_metadata_state.proto";
import "wfa/measurement/internal/edpaggregator/raw_impression_metadata_key.proto";

option java_package = "org.wfanet.measurement.internal.edpaggregator";
option java_multiple_files = true;

// Key of an entity in a DataProvider's system that an ImpressionMetadata
// blob is associated with.
//
// The variant inside `key` identifies which DataProvider's taxonomy the entity
// belongs to. Each variant carries a per-EDP enum of valid entity types plus
// the entity's ID.
//
// Adding a new EDP means adding a new variant to the `key` oneof and a new
// corresponding message type (e.g. `GoogleEntityKey`). Storage and filtering
// for a new EDP requires a corresponding child table.
message EntityKey {
  // Exactly one variant must be set.
  oneof key {
    MetaEntityKey meta = 1;
  }
}

// Entity key for entities in Meta's system (Facebook / Instagram).
message MetaEntityKey {
  // Taxonomy of entities in Meta's system that an ImpressionMetadata blob
  // may be associated with.
  enum Type {
    TYPE_UNSPECIFIED = 0;
    AD = 1;
    AD_SET = 2;
    CAMPAIGN = 3;
    AD_ACCOUNT = 4;
  }

  Type type = 1;

  // ID of the entity in Meta's system.
  //
  // Must be a URL-safe string, such that URL-encoding or -decoding results
  // in the same string.
  string id = 2;
}

// Proto representation of the internal ImpressionMetadata entity type.
message ImpressionMetadata {
  string data_provider_resource_id = 1;
  string impression_metadata_resource_id = 2;

  string blob_uri = 3;
  string blob_type_url = 4;

  string event_group_reference_id = 5;

  // The resource name of the ModelLine in the CMMS (Kingdom).
  string cmms_model_line = 6;

  google.type.Interval interval = 7;

  ImpressionMetadataState state = 8;

  google.protobuf.Timestamp create_time = 9;
  google.protobuf.Timestamp update_time = 10;

  // The etag of ImpressionMetadata
  string etag = 11;

  // External key reference to the source RawImpressionMetadata.
  // Optional; unset when there is no source raw impression.
  RawImpressionMetadataKey raw_impression_metadata_key = 12;

  // Entities in the DataProvider's system that the impressions in this blob
  // are associated with.
  //
  // A single blob may be tagged with multiple entities. Consumers may use
  // this field to filter blobs to a subset of entities without joining
  // against EventGroup metadata.
  repeated EntityKey entity_keys = 13;
}

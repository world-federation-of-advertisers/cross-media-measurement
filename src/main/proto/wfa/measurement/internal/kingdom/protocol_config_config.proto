syntax = "proto3";

package wfa.measurement.internal.kingdom;

import "wfa/measurement/internal/kingdom/duchy_protocol_config.proto";
import "wfa/measurement/internal/kingdom/protocol_config.proto";

option java_package = "org.wfanet.measurement.internal.kingdom";
option java_multiple_files = true;

// The kingdom local config proto used to initialize the `ProtocolConfig` and
// `DuchyProtocolConfig` for the Liquid Legions v2 protocols.
message Llv2ProtocolConfigConfig {
  ProtocolConfig.LiquidLegionsV2 protocol_config = 1;
  DuchyProtocolConfig.LiquidLegionsV2 duchy_protocol_config = 2;
  // List of required duchies for this protocol. E.g. aggregator.
  repeated string required_external_duchy_ids = 3;
  int32 minimum_duchy_participant_count = 4;
}

// The kingdom local config proto used to initialize the `ProtocolConfig` for
// the Honest Majority Share Shuffle protocol.
message HmssProtocolConfigConfig {
  // The HonestMajorityShareShuffle protocol Config.
  ProtocolConfig.HonestMajorityShareShuffle protocol_config = 1;
  // The duchy id of the first non-aggregator.
  string first_non_aggregator_duchy_id = 2;
  // The duchy id of the second non-aggregator.
  string second_non_aggregator_duchy_id = 3;
  // The duchy id of the aggregator.
  string aggregator_duchy_id = 4;
}

// The kingdom local config proto used to initialize the `ProtocolConfig` for
// the TrusTEE protocol.
message TrusTeeProtocolConfigConfig {
  // The TrusTee protocol Config.
  //
  // The `noise_mechanism` within this config is used as the default when
  // `noise_mechanisms` is not specified. This field is planned to be deprecated
  // in a future Halo CMM release.
  ProtocolConfig.TrusTee protocol_config = 1;
  // The id of the duchy executing the computation.
  string duchy_id = 2;

  // The set of noise mechanisms supported by this server for TrusTEE
  // computations.
  //
  // When specified, the Kingdom will intersect these with each
  // `DataProvider`'s `noise_mechanisms` to select the noise mechanism
  // for a `Measurement`. If not specified, falls back to
  // `protocol_config.noise_mechanism`. This field is planned to become REQUIRED
  // in a future Halo CMM release.
  repeated ProtocolConfig.NoiseMechanism noise_mechanisms = 3;

  // Operator-configured policy: maximum number of `DataProvider`s in a
  // `Measurement` that are NOT `is_panel_projection` (i.e. that may be
  // event-level / impression-level) for which `NoiseMechanism.NONE` is
  // permitted to be selected.
  //
  // If a `Measurement` contains more `DataProvider`s without
  // `is_panel_projection = true` than this value, `NONE` is excluded from the
  // noise mechanism selection set for that `Measurement` (a noisy mechanism
  // such as `CONTINUOUS_GAUSSIAN` is selected instead).
  //
  // The default (unset / `0`) is the strictest, privacy-conservative policy:
  // `NONE` may only be selected when ALL `DataProvider`s in a `Measurement`
  // have `is_panel_projection = true`. Operators may relax this by setting a
  // higher value.
  //
  // This guards against differential queries over a no-noise aggregate
  // exposing precise cross-publisher overlap that no individual
  // `DataProvider` has consented to.
  int32 max_non_panel_projection_edps_for_none_noise = 4;
}

syntax = "proto3";

package wfa.measurement.internal.kingdom;

option java_package = "org.wfanet.measurement.internal.kingdom";
option java_multiple_files = true;

message DataProviderCapabilities {
  // Whether the Honest Majority Share Shuffle (HMSS) protocol is supported.
  bool honest_majority_share_shuffle_supported = 1;
  // Whether the TrusTEE protocol is supported.
  bool trus_tee_supported = 2;

  // Whether the no-noise (NONE) mechanism is supported.
  // CONTINUOUS_GAUSSIAN is always assumed to be supported.
  bool noise_mechanism_none_supported = 3;

  // Whether this `DataProvider` attests that ALL of its `Requisition`
  // fulfillments are based on panel projections (statistical projections from
  // a sample panel to a population), as opposed to event-level (e.g.
  // impression-level) data.
  //
  // Default `false` is the privacy-conservative assumption (the
  // `DataProvider` may be event-level). Used as input to noise-mechanism
  // selection for protocols (such as TrusTEE) whose privacy properties
  // depend on the data shape of the contributing `DataProvider`s.
  bool is_panel_projection = 4;
}

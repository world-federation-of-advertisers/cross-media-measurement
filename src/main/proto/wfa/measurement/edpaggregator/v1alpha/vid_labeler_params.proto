syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "wfa/measurement/edpaggregator/v1alpha/file_system_transport_layer_security_params.proto";
import "wfa/measurement/edpaggregator/v1alpha/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "VidLabelerParamsProto";

// Per-invocation parameters passed over the wire to the VID Labeling TEE
// application. Static configuration is in
// wfa.measurement.config.edpaggregator.VidLabelingConfig.
message VidLabelerParams {
  // The CMMS resource name for the EDP.
  string data_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "halo.wfanet.org/DataProvider"
  ];

  // Deprecated: Use VidLabelingConfig.storage_params instead.
  message StorageParams {
    option deprecated = true;

    string gcs_project_id = 1 [(google.api.field_behavior) = REQUIRED];
    string labeled_impressions_blob_prefix = 2
        [(google.api.field_behavior) = REQUIRED];
  }

  // Deprecated: Use VidLabelingConfig.storage_params instead.
  StorageParams storage_params = 2 [deprecated = true];

  // Deprecated: Use VidLabelingConfig.vid_repo_connection instead.
  TransportLayerSecurityParams vid_repo_connection = 3 [deprecated = true];

  // Deprecated: Use VidLabelingConfig.ModelLineConfig instead.
  message ModelLineConfig {
    option deprecated = true;

    map<string, string> labeler_input_field_mapping = 1;
    map<string, string> event_template_field_mapping = 2;
  }

  // Deprecated: Use VidLabelingConfig.model_line_configs instead.
  map<string, ModelLineConfig> model_line_configs = 4 [deprecated = true];

  // Deprecated: Use VidLabelingConfig.override_model_lines instead.
  repeated string override_model_lines = 5 [deprecated = true];

  // The input blob URIs to process.
  repeated string input_blob_uris = 6 [(google.api.field_behavior) = REQUIRED];

  // Zero-based index identifying the batch within the upload.
  int64 batch_index = 7 [(google.api.field_behavior) = REQUIRED];

  // Deprecated: Use
  // VidLabelingConfig.raw_impression_metadata_storage_connection instead.
  FileSystemTransportLayerSecurityParams
      raw_impression_metadata_storage_connection = 8 [deprecated = true];

  // Deprecated: Use VidLabelingConfig.batch_max_size instead.
  optional fixed64 batch_max_size = 9 [deprecated = true];
}

syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "wfa/measurement/edpaggregator/v1alpha/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "VidLabelerParamsProto";

// Per-invocation parameters passed over the wire to the VID Labeling
// Dispatcher cloud function. Static configuration is loaded separately
// from VidLabelingDispatcherConfig.
message VidLabelerParams {
  // The CMMS resource name of the DataProvider.
  string data_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "halo.wfanet.org/DataProvider"
  ];

  // Deprecated: Use VidLabelingDispatcherConfig.StorageParams instead.
  message StorageParams {
    option deprecated = true;

    // The Google Cloud Storage project ID for the storage instance.
    string gcs_project_id = 1;

    // The blob URI prefix where the labeled impressions will be stored in
    // Google Cloud Storage once generated by the app for a given EDP.
    string labeled_impressions_blob_prefix = 2;
  }

  // Deprecated: Moved to VidLabelingDispatcherConfig.storage_params.
  StorageParams storage_params = 2 [
    deprecated = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Deprecated: Moved to VidLabelingDispatcherConfig.vid_repo_connection.
  TransportLayerSecurityParams vid_repo_connection = 3 [
    deprecated = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Deprecated: Use VidLabelingDispatcherConfig.ModelLineConfig instead.
  message ModelLineConfig {
    option deprecated = true;

    // Mapping from labeler input field names to their corresponding values.
    map<string, string> labeler_input_field_mapping = 1;

    // Mapping from event template field names to their corresponding values.
    map<string, string> event_template_field_mapping = 2;
  }

  // Deprecated: Moved to VidLabelingDispatcherConfig.model_line_configs.
  map<string, ModelLineConfig> model_line_configs = 4 [deprecated = true];

  // Deprecated: Moved to VidLabelingDispatcherConfig.override_model_lines.
  repeated string override_model_lines = 5 [
    deprecated = true,
    (google.api.resource_reference).type = "halo.wfanet.org/ModelLine"
  ];

  // The input blob URIs to process.
  repeated string input_blob_uris = 6 [(google.api.field_behavior) = REQUIRED];

  // Zero-based index identifying the batch within the upload.
  string batch_index = 7 [(google.api.field_behavior) = REQUIRED];
}

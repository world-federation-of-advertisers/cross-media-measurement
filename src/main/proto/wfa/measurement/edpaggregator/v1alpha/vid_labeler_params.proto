syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "wfa/measurement/edpaggregator/v1alpha/labeler_input_field_mapping.proto";
import "wfa/measurement/edpaggregator/v1alpha/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "VidLabelerParamsProto";

// Parameters for the VID Labeling TEE application, built by the Cloud Function
// dispatcher from VidLabelingConfig and passed to the Secure Computation API
// as a google.protobuf.Any.
message VidLabelerParams {
  // The CMMS resource name for the EDP.
  string data_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "halo.wfanet.org/DataProvider"
  ];

  // Message representing storage details for reading or writing impressions
  // in Google Cloud Storage.
  message StorageParams {
    // The Google Cloud Storage project ID for the storage instance.
    string gcs_project_id = 1 [(google.api.field_behavior) = REQUIRED];

    // The blob URI prefix for impressions in Google Cloud Storage.
    string impressions_blob_prefix = 2 [(google.api.field_behavior) = REQUIRED];
  }

  // Storage for raw impressions read by the TEE app.
  StorageParams raw_impressions_storage_params = 2
      [(google.api.field_behavior) = REQUIRED];

  // Storage for VID-labeled impressions written by the TEE app.
  StorageParams vid_labeled_impressions_storage_params = 3
      [(google.api.field_behavior) = REQUIRED];

  // Connection used by the TEE app to access the VID Repo.
  //
  // Configuration-dependent, not path-dependent: one labeler serves both the
  // non-memoized and memoized model-line configurations. Required for the
  // non-memoized configuration, which resolves VIDs against the VID Repo. Unset
  // for the memoized configuration ([memoized_params] set), which derives each
  // VID from its memoized rank using the compiled model named for its model
  // line in [model_blob_paths] and never calls the VID Repo (an overflow /
  // unseen fingerprint falls back to the locally-computed hash path).
  TransportLayerSecurityParams vid_repo_connection = 4
      [(google.api.field_behavior) = OPTIONAL];

  // Message representing the configuration for a model line.
  message ModelLineConfig {
    reserved 1;

    // How each LabelerInput field is sourced from the raw-impression row.
    repeated LabelerInputFieldMapping labeler_input_field_mapping = 10;

    // Mapping from event template field names to their corresponding values.
    map<string, string> event_template_field_mapping = 2;

    // Inclusive start of the model line's active window. Impressions whose
    // event timestamp is before this point are dropped before labeling.
    // Mirrors `ModelLine.active_start_time` from the public API.
    google.protobuf.Timestamp active_start_time = 3
        [(google.api.field_behavior) = OPTIONAL];

    // Exclusive end of the model line's active window. Impressions whose
    // event timestamp is at or after this point are dropped before labeling.
    // Unset means no upper bound. Mirrors `ModelLine.active_end_time` from
    // the public API.
    google.protobuf.Timestamp active_end_time = 4
        [(google.api.field_behavior) = OPTIONAL];
  }

  // Map from model line resource name to its configuration.
  map<string, ModelLineConfig> model_line_configs = 5
      [(google.api.field_behavior) = REQUIRED];

  // Optional; if provided, indicates what model lines to use.
  repeated string override_model_lines = 6 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference).type = "halo.wfanet.org/ModelLine"
  ];

  // Fully qualified resource name of the `RawImpressionUpload` this WorkItem is
  // processing. Used by the TEE app to interact with the gRPC API.
  string raw_impression_upload = 7 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type =
        "edpaggregator.halo-cmm.org/RawImpressionUpload"
  ];

  // Cloud Storage for the compiled VID model blobs named by [model_blob_paths].
  // The compiled model lives in its own Cloud Storage project, separate from
  // the impression storage, so it carries a dedicated project. Set on both
  // paths (reuses field 8, freed by the removed static-sharding `shard_index`).
  StorageParams model_storage_params = 8
      [(google.api.field_behavior) = OPTIONAL];

  // The `VidLabelingJob` this WorkItem fulfils: the bin-packed file batch plus
  // the model lines it covers. The TEE marks it `SUCCEEDED`/`FAILED`; the
  // last-job-out flips each covered model line to `COMPLETED`. Set on both
  // paths (reuses field 9, freed by the removed static-sharding
  // `total_shards`).
  string vid_labeling_job = 9 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference).type =
        "edpaggregator.halo-cmm.org/VidLabelingJob"
  ];

  // Map from model line resource name to its model blob path. Resolved by the
  // dispatcher from ModelShard so the TEE app does not need to interact with
  // the VID Repository API.
  map<string, string> model_blob_paths = 10
      [(google.api.field_behavior) = REQUIRED];

  // The `ModelLine`s this WorkItem labels: exactly one on the memoized path,
  // the bundled set on the non-memoized path. Distinct from
  // [override_model_lines], which is the operator-header override applied on
  // top. Set on both paths.
  repeated string model_lines = 12 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference).type = "halo.wfanet.org/ModelLine"
  ];

  // Parameters for the memoized rank-index Phase-2 path.
  //
  // Its presence selects the memoized path: the TEE resolves the per-subpool
  // rank-index blobs from the `RankIndexBlobService` (gRPC) for the upload and
  // derives each VID from its memoized rank, instead of the non-memoized
  // hash-only path. The shared payload (`raw_impression_upload`,
  // `vid_labeling_job`, `model_lines`, `model_blob_paths`,
  // `model_storage_params`) lives at the top level for both paths —
  // `raw_impression_upload` is still set (it is REQUIRED) and scopes the
  // rank-index lookup; this message carries only the memoized-specific storage.
  MemoizedParams memoized_params = 11 [(google.api.field_behavior) = OPTIONAL];

  // Parameters specific to the memoized rank-index Phase-2 path.
  message MemoizedParams {
    // Storage holding the rank-index blobs. The TEE resolves the individual
    // blob URIs from the `RankIndexBlobService`; this supplies the project +
    // blob prefix needed to read their bytes.
    StorageParams vid_rank_map_storage_params = 1
        [(google.api.field_behavior) = REQUIRED];
  }
}

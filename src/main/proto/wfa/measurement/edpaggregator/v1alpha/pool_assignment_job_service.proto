syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/type/date.proto";
import "google/type/interval.proto";
import "wfa/measurement/edpaggregator/v1alpha/encrypted_dek.proto";
import "wfa/measurement/edpaggregator/v1alpha/pool_assignment_job.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "PoolAssignmentJobServiceProto";

// Service for managing `PoolAssignmentJob` resources.
service PoolAssignmentJobService {
  // Creates a new `PoolAssignmentJob`.
  rpc CreatePoolAssignmentJob(CreatePoolAssignmentJobRequest)
      returns (PoolAssignmentJob) {}

  // Creates multiple `PoolAssignmentJob` resources in a single
  // request.
  rpc BatchCreatePoolAssignmentJobs(BatchCreatePoolAssignmentJobsRequest)
      returns (BatchCreatePoolAssignmentJobsResponse) {}

  // Retrieves a specific `PoolAssignmentJob`.
  rpc GetPoolAssignmentJob(GetPoolAssignmentJobRequest)
      returns (PoolAssignmentJob) {}

  // Lists `PoolAssignmentJob` resources for an upload.
  rpc ListPoolAssignmentJobs(ListPoolAssignmentJobsRequest)
      returns (ListPoolAssignmentJobsResponse) {}

  // Marks a `PoolAssignmentJob` as `SUCCEEDED`. Atomically
  // checks if this is the last shard for the (upload, model
  // line) and returns the signal to the caller. Throws
  // ABORTED if etag does not match the current resource
  // version (AIP-154). A retry with the same `request_id`
  // returns the original response without modifying state
  // (AIP-155).
  rpc MarkPoolAssignmentJobSucceeded(MarkPoolAssignmentJobSucceededRequest)
      returns (MarkPoolAssignmentJobSucceededResponse) {}

  // Marks a `PoolAssignmentJob` as `FAILED`.
  rpc MarkPoolAssignmentJobFailed(MarkPoolAssignmentJobFailedRequest)
      returns (PoolAssignmentJob) {}
}

// Request message for the `CreatePoolAssignmentJob` method.
message CreatePoolAssignmentJobRequest {
  // The parent upload resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];

  // The `PoolAssignmentJob` to create.
  // The `name` and output-only fields are ignored.
  PoolAssignmentJob pool_assignment_job = 2
      [(google.api.field_behavior) = REQUIRED];

  // A request ID provided by the client to ensure idempotency.
  //
  // This field must be a UUID4 (RFC 4122) string.
  string request_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.field_info).format = UUID4
  ];
}

// Request message for the
// `BatchCreatePoolAssignmentJobs` method.
message BatchCreatePoolAssignmentJobsRequest {
  // The parent upload resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];

  // Individual create requests. Maximum 50 per batch.
  repeated CreatePoolAssignmentJobRequest requests = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Response message for the
// `BatchCreatePoolAssignmentJobs` method.
message BatchCreatePoolAssignmentJobsResponse {
  // The created pool assignment jobs.
  repeated PoolAssignmentJob pool_assignment_jobs = 1;
}

// Request message for the `GetPoolAssignmentJob` method.
message GetPoolAssignmentJobRequest {
  // The resource name of the job to retrieve.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}/poolAssignmentJobs/{pool_assignment_job}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];
}

// Request message for the `ListPoolAssignmentJobs` method.
// (-- api-linter: core::0132::request-field-types=disabled
//     aip.dev/not-precedent: Using a customized message for the
//     filter. --)
message ListPoolAssignmentJobsRequest {
  // The parent upload resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}`
  //
  // The upload segment may be the wildcard `-` to list
  // jobs across all uploads for a data provider. See
  // AIP-159.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];

  // The maximum number of results to return.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // A page token, received from a previous call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Structured filter for narrowing results.
  message Filter {
    // Filter to resources whose state is in this set. Empty matches all states.
    // (-- api-linter: core::0216::state-field-output-only=disabled
    //     aip.dev/not-precedent: This is a filter input field, not
    //     a resource state field. --)
    // (-- api-linter: core::0140::prepositions=disabled
    //     aip.dev/not-precedent: `_in` is the established repo convention
    //     for set-membership filter fields. --)
    repeated PoolAssignmentJob.State state_in = 1
        [(google.api.field_behavior) = OPTIONAL];

    // Filter for resources whose create_time is in the given interval.
    // Start and end are both optional: omitting start_time matches
    // resources created before end_time; omitting end_time matches
    // resources created at or after start_time.
    // (-- api-linter: core::0140::prepositions=disabled
    //     aip.dev/not-precedent: `_in` is the established repo convention
    //     for set-membership filter fields. --)
    google.type.Interval create_time_in = 2
        [(google.api.field_behavior) = OPTIONAL];

    // Filter by CMMS model line resource name.
    string cmms_model_line = 3 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = { type: "halo.wfanet.org/ModelLine" }
    ];
  }

  // Optional. A filter to apply to the results.
  Filter filter = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for the `ListPoolAssignmentJobs` method.
message ListPoolAssignmentJobsResponse {
  // The list of pool assignment jobs matching the request.
  repeated PoolAssignmentJob pool_assignment_jobs = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request message for the
// `MarkPoolAssignmentJobSucceeded` method.
message MarkPoolAssignmentJobSucceededRequest {
  // The resource name of the job.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}/poolAssignmentJobs/{pool_assignment_job}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];

  // The etag of the PoolAssignmentJob for optimistic locking.
  string etag = 2 [(google.api.field_behavior) = REQUIRED];

  // A request ID provided by the client to ensure idempotency
  // on retry. A retry with the same `request_id` returns the
  // original response without re-transitioning the resource.
  //
  // This field must be a UUID4 (RFC 4122) string.
  string request_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.field_info).format = UUID4
  ];

  // The DEK that encrypts this shard's `SubpoolFingerprints` blobs.
  // Persisted by the server onto the job's OUTPUT_ONLY
  // `PoolAssignmentJob.encrypted_dek` atomically with the `SUCCEEDED`
  // transition. On the last-shard mark, the server additionally promotes
  // this DEK to the parent `RawImpressionUploadModelLine.encrypted_merged_dek`
  // so a retrying SubpoolAssigner's merge stays consistent with the
  // already-written merged blobs.
  wfa.measurement.securecomputation.impressions.EncryptedDek encrypted_dek = 4
      [(google.api.field_behavior) = REQUIRED];

  // Subpool offsets discovered by this shard during Phase 0. The service unions
  // these across all shards of the (upload, model line); on the last shard out
  // it returns the union in `LastShardResult` and persists it on
  // `RawImpressionUploadModelLine.pool_offsets`. May be empty for a shard that
  // produced no subpools.
  repeated int64 pool_offsets = 5 [(google.api.field_behavior) = OPTIONAL];

  // The latest event date (UTC) among the impressions this shard wrote into its
  // `SubpoolFingerprints` blobs. The service reduces these to a maximum across
  // all shards of the (upload, model line); on the last shard out it returns
  // that maximum in `LastShardResult` and persists it on
  // `RawImpressionUploadModelLine.max_event_date`. Unset for a shard that wrote
  // no impressions.
  google.type.Date max_event_date = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for the
// `MarkPoolAssignmentJobSucceeded` method.
message MarkPoolAssignmentJobSucceededResponse {
  // The updated PoolAssignmentJob.
  PoolAssignmentJob pool_assignment_job = 1;

  // Present when this is the last shard to complete for the
  // (upload, model line). Contains the pool offsets discovered
  // during Phase 0, used to create RankerJob rows and trigger
  // Phase 1.
  LastShardResult last_shard_result = 2;

  // Result of the last shard completing. Present only when the
  // last-shard mark resulted in non-empty cross-shard work; omitted
  // if no shard wrote impressions.
  message LastShardResult {
    // The pool offsets discovered during Phase 0.
    repeated int64 pool_offsets = 1 [(google.api.field_behavior) = REQUIRED];

    // The maximum event date (UTC) across all shards, reduced from every
    // shard's reported `max_event_date`. Stamped onto each Phase-1
    // `VidRankBuilderParams.max_event_date` so the rank-map retention sweep can
    // age out blobs. Always set on the last-shard result.
    google.type.Date max_event_date = 2
        [(google.api.field_behavior) = REQUIRED];
  }
}

// Request message for the
// `MarkPoolAssignmentJobFailed` method.
message MarkPoolAssignmentJobFailedRequest {
  // The resource name of the job.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}/poolAssignmentJobs/{pool_assignment_job}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/PoolAssignmentJob"
    }
  ];

  // The etag of the PoolAssignmentJob for optimistic locking.
  string etag = 2 [(google.api.field_behavior) = REQUIRED];

  // Human-readable detail about the failure.
  string error_message = 3 [(google.api.field_behavior) = OPTIONAL];
}

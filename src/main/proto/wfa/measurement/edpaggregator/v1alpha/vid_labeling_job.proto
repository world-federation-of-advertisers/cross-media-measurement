syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "VidLabelingJobProto";

// A Phase-2 VID labeling job for a RawImpressionUpload.
// One record per (upload, model line, file batch), created by the
// Phase-1 last-RankerJob-out when transitioning
// RawImpressionUploadModelLine from RANKING to LABELING.
// When the last VidLabelingJob for a (upload, model line) reaches
// SUCCEEDED, the last-job-out flips
// RawImpressionUploadModelLine from LABELING to COMPLETED and
// triggers DataAvailabilitySync.
message VidLabelingJob {
  option (google.api.resource) = {
    type: "edpaggregator.halo-cmm.org/VidLabelingJob"
    pattern: "dataProviders/{data_provider}/rawImpressionUploads/{raw_impression_upload}/vidLabelingJobs/{vid_labeling_job}"
    singular: "vidLabelingJob"
    plural: "vidLabelingJobs"
  };

  // Processing state for a VidLabelingJob.
  enum State {
    // Default, unspecified state. Should not be used.
    STATE_UNSPECIFIED = 0;
    // The job has been created and is awaiting processing.
    CREATED = 1;
    // The job completed successfully. Terminal state.
    SUCCEEDED = 2;
    // The job failed. Not terminal — operator can retry after
    // fixing the root cause.
    FAILED = 3;
  }

  // Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The processing state of this job.
  State state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The CMMS model line resource names that this job processes.
  repeated string cmms_model_lines = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = { type: "halo.wfanet.org/ModelLine" }
  ];

  // The RawImpressionUploadFiles this job labels. Bin-packed
  // by the Phase-1 last-out so each job's total input size
  // stays under a configured threshold.
  repeated string raw_impression_upload_files = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/RawImpressionUploadFile"
    }
  ];

  // The timestamp when this record was created.
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The timestamp when this record was last updated.
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Detail about the failure, set when state is FAILED.
  string error_message = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Entity tag for optimistic concurrency control.
  string etag = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
}

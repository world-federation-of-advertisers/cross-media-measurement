syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "wfa/measurement/edpaggregator/v1alpha/raw_impression_metadata_file.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionMetadataFileServiceProto";

// Service for managing RawImpressionMetadataFile resources within a batch.
service RawImpressionMetadataFileService {
  // Creates a new RawImpressionMetadataFile within a batch.
  rpc CreateRawImpressionMetadataFile(CreateRawImpressionMetadataFileRequest)
      returns (RawImpressionMetadataFile) {}

  // Creates multiple RawImpressionMetadataFile entries in a single request.
  rpc BatchCreateRawImpressionMetadataFiles(BatchCreateRawImpressionMetadataFilesRequest)
      returns (BatchCreateRawImpressionMetadataFilesResponse) {}

  // Retrieves a specific RawImpressionMetadataFile.
  rpc GetRawImpressionMetadataFile(GetRawImpressionMetadataFileRequest)
      returns (RawImpressionMetadataFile) {}

  // Lists RawImpressionMetadataFile resources within a batch.
  rpc ListRawImpressionMetadataFiles(ListRawImpressionMetadataFilesRequest)
      returns (ListRawImpressionMetadataFilesResponse) {}

  // Soft-deletes a RawImpressionMetadataFile.
  rpc DeleteRawImpressionMetadataFile(DeleteRawImpressionMetadataFileRequest)
      returns (RawImpressionMetadataFile) {}

  // Soft-deletes multiple RawImpressionMetadataFile entries in a single request.
  rpc BatchDeleteRawImpressionMetadataFiles(BatchDeleteRawImpressionMetadataFilesRequest)
      returns (BatchDeleteRawImpressionMetadataFilesResponse) {}
}

// Request message for the `CreateRawImpressionMetadataFile` method.
message CreateRawImpressionMetadataFileRequest {
  // The parent batch resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];

  // The RawImpressionMetadataFile to create.
  // The `name` and output-only fields are ignored.
  RawImpressionMetadataFile raw_impression_metadata_file = 2
      [(google.api.field_behavior) = REQUIRED];

  // A request ID provided by the client to ensure idempotency.
  //
  // This field must be a UUID4 (RFC 4122) string.
  string request_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.field_info).format = UUID4
  ];
}

// Request message for the `BatchCreateRawImpressionMetadataFiles` method.
message BatchCreateRawImpressionMetadataFilesRequest {
  // The parent batch resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];

  // The list of RawImpressionMetadataFile entries to create.
  repeated CreateRawImpressionMetadataFileRequest requests = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Response message for the `BatchCreateRawImpressionMetadataFiles` method.
message BatchCreateRawImpressionMetadataFilesResponse {
  // The list of newly created RawImpressionMetadataFile entries, in the same order as
  // the request.
  repeated RawImpressionMetadataFile raw_impression_metadata_files = 1;
}

// Request message for the `GetRawImpressionMetadataFile` method.
message GetRawImpressionMetadataFileRequest {
  // The resource name of the RawImpressionMetadataFile to retrieve.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}/rawImpressionMetadataFiles/{raw_impression_metadata_file}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];
}

// Request message for the `ListRawImpressionMetadataFiles` method.
message ListRawImpressionMetadataFilesRequest {
  // The parent batch resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];

  // The maximum number of results to return.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // A page token, received from a previous call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // A flag indicating whether to include soft DELETED entries.
  bool show_deleted = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for the `ListRawImpressionMetadataFiles` method.
message ListRawImpressionMetadataFilesResponse {
  // A list of `RawImpressionMetadataFile` entries matching the request.
  repeated RawImpressionMetadataFile raw_impression_metadata_files = 1;

  // A token to retrieve the next page of results.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request message for the `DeleteRawImpressionMetadataFile` method.
message DeleteRawImpressionMetadataFileRequest {
  // The resource name of the RawImpressionMetadataFile to delete.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}/rawImpressionMetadataFiles/{raw_impression_metadata_file}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];
}

// Request message for the `BatchDeleteRawImpressionMetadataFiles` method.
message BatchDeleteRawImpressionMetadataFilesRequest {
  // The parent batch resource name.
  // Format:
  // `dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "edpaggregator.halo-cmm.org/RawImpressionMetadataFile"
    }
  ];

  // The list of RawImpressionMetadataFile entries to delete.
  repeated DeleteRawImpressionMetadataFileRequest requests = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Response message for the `BatchDeleteRawImpressionMetadataFiles` method.
message BatchDeleteRawImpressionMetadataFilesResponse {
  // The list of soft-deleted RawImpressionMetadataFile entries.
  repeated RawImpressionMetadataFile raw_impression_metadata_files = 1;
}

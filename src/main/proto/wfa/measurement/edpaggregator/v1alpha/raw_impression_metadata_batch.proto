syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionMetadataBatchProto";

// A batch of raw impression files uploaded by an EDP.
message RawImpressionMetadataBatch {
  option (google.api.resource) = {
    type: "edpaggregator.halo-cmm.org/RawImpressionMetadataBatch"
    pattern: "dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}"
    singular: "rawImpressionMetadataBatch"
    plural: "rawImpressionMetadataBatches"
  };

  // The state of the batch.
  enum State {
    // Default, unspecified state. Should not be used.
    STATE_UNSPECIFIED = 0;
    // The batch has been created and is awaiting processing.
    CREATED = 1;
    // All files in the batch have been successfully processed.
    PROCESSED = 2;
    // Processing failed for one or more files in the batch.
    FAILED = 3;
  }

  // Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The current state of the batch.
  State state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The timestamp when this batch was created.
  google.protobuf.Timestamp create_time = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The timestamp when this batch was last updated.
  google.protobuf.Timestamp update_time = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The timestamp when this batch was soft-deleted.
  // Only populated if the batch has been deleted.
  google.protobuf.Timestamp delete_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

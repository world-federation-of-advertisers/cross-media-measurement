syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "RawImpressionMetadataBatchFileProto";

// Metadata for a raw impression file within a batch.
// This resource tracks individual files uploaded as part of a
// batched raw impression upload by an EDP.
message RawImpressionMetadataBatchFile {
  option (google.api.resource) = {
    type: "edpaggregator.halo-cmm.org/RawImpressionMetadataBatchFile"
    pattern: "dataProviders/{data_provider}/rawImpressionMetadataBatches/{raw_impression_metadata_batch}/files/{file}"
    singular: "rawImpressionMetadataBatchFile"
    plural: "rawImpressionMetadataBatchFiles"
  };

  // Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The blob storage URI of the raw impression file.
  // This is provided by the client on creation and cannot be
  // changed.
  string blob_uri = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // The timestamp when this file entry was created.
  google.protobuf.Timestamp create_time = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The timestamp when this file entry was last updated.
  google.protobuf.Timestamp update_time = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // The timestamp when this file was soft-deleted.
  // Only populated if the file has been deleted.
  google.protobuf.Timestamp delete_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

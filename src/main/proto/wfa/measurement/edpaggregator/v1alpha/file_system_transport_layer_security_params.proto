syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;
option java_outer_classname = "FileSystemTransportLayerSecurityParamsProto";

// TLS client credential filesystem paths used by a Cloud Function to connect
// to an mTLS-secured API.
message FileSystemTransportLayerSecurityParams {
  // The path on the filesystem where the client certificate is mounted.
  string cert_file_path = 1 [(google.api.field_behavior) = REQUIRED];

  // The path on the filesystem where the client private key is mounted.
  string private_key_file_path = 2 [(google.api.field_behavior) = REQUIRED];

  // The path on the filesystem where the trusted certificate collection is
  // mounted.
  string cert_collection_file_path = 3 [(google.api.field_behavior) = REQUIRED];
}

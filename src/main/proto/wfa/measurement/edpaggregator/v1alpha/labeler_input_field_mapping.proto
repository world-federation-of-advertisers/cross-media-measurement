syntax = "proto3";

package wfa.measurement.edpaggregator.v1alpha;

import "google/api/field_behavior.proto";

option java_package = "org.wfanet.measurement.edpaggregator.v1alpha";
option java_multiple_files = true;

// One mapping from a `LabelerInput` field to its source in the raw-impression
// Parquet row. Replaces the flat `field_path -> column` map so a source can be
// a plain column, an enum lookup, an age-range decode, or an identity fallback.
//
// Shared by the operator `VidLabelingConfig.ModelLineConfig` and the phase
// params (`SubpoolAssignerParams`, `VidRankBuilderParams`, `VidLabelerParams`).
message LabelerInputFieldMapping {
  // Dot-separated path into `LabelerInput`, e.g. "event_id.id" or
  // "profile_info.email_user_info.demo.demo_bucket.gender". For [age_range] the
  // path points at the age sub-message (e.g.
  // "profile_info.email_user_info.demo.demo_bucket.age").
  string field_path = 1 [(google.api.field_behavior) = REQUIRED];

  oneof source {
    // 1:1 column -> leaf; sets the leaf from this column's value.
    ScalarColumn scalar = 2;

    // Reads a string column and translates it to the target enum value.
    EnumLookup enum_lookup = 3;

    // Fills an age `{min_age, max_age}` sub-message from an EDP age encoding.
    AgeRange age_range = 4;

    // First non-null of several columns wins (identity fallback).
    CompositeIdentity composite_identity = 5;
  }
}

// 1:1 raw column -> `LabelerInput` leaf (the pre-reshape behavior).
message ScalarColumn {
  string column = 1 [(google.api.field_behavior) = REQUIRED];
}

// Reads [column] as a string and maps it to a target enum value name via
// [lookup_table] (e.g. gender "M" -> "MALE").
message EnumLookup {
  string column = 1 [(google.api.field_behavior) = REQUIRED];

  // Raw column value -> target enum value name.
  map<string, string> lookup_table = 2 [(google.api.field_behavior) = REQUIRED];

  // Enum value name used when a non-null column value is absent from
  // [lookup_table]. If empty, an unmapped non-null value is an error.
  string default_enum_value = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Fills a `LabelerInput` age sub-message (`{uint32 min_age, uint32 max_age}`)
// from one of three common EDP encodings. The enclosing
// [LabelerInputFieldMapping.field_path] points at the age sub-message.
message AgeRange {
  oneof source {
    // One integer column; sets `min_age = max_age = value`.
    string single_age_column = 1;

    // Two integer columns.
    MinMaxColumns min_max_columns = 2;

    // A string bucket column whose values are looked up in an operator-defined
    // table (any label, e.g. "18-24" or "65 and over"). Handles non-canonical
    // EDP bucket labels without assuming a parseable format.
    BucketLookup bucket_lookup = 3;
  }
}

// A pair of integer columns for [AgeRange].
message MinMaxColumns {
  string min_age_column = 1 [(google.api.field_behavior) = REQUIRED];
  string max_age_column = 2 [(google.api.field_behavior) = REQUIRED];
}

// Looks up a string bucket column's value in [bucket_table] and sets the age
// sub-message from the matched [AgeBucket]. A value not in [bucket_table] is an
// error (the operator must enumerate every bucket the EDP ships), mirroring
// [EnumLookup] without a default.
message BucketLookup {
  string column = 1 [(google.api.field_behavior) = REQUIRED];

  // Bucket label (as it appears in the column) -> the age range it denotes.
  map<string, AgeBucket> bucket_table = 2
      [(google.api.field_behavior) = REQUIRED];
}

// An age range copied verbatim into the target age sub-message. Use the
// target's convention for open-ended upper buckets (wfa_virtual_people uses
// max_age = 1000 for "and above"), e.g. "65+" -> {min_age: 65, max_age: 1000}.
message AgeBucket {
  int32 min_age = 1 [(google.api.field_behavior) = REQUIRED];
  int32 max_age = 2 [(google.api.field_behavior) = REQUIRED];
}

// Sets the `LabelerInput` leaf from the first non-null of [columns], in order;
// leaves it unset if every column is null. All columns must map to the leaf's
// type.
message CompositeIdentity {
  repeated string columns = 1 [(google.api.field_behavior) = REQUIRED];
}

syntax = "proto3";

package wfa.measurement.reporting.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "wfa/measurement/reporting/v1alpha/time_interval.proto";

option java_package = "org.wfanet.measurement.reporting.v1alpha";
option java_multiple_files = true;

// A metric set using data from the Cross-Media Measurement System.
message MetricSet {
  string measurement_consumer = 1 [(google.api.resource_reference) = {
    type: "halo.wfanet.org/MeasurementConsumer"
  }];

  message EventGroupFilter {
    // Key of the map entry, which is an `EventGroup` resource name. Required.
    string key = 1 [
      (google.api.field_behavior) = REQUIRED,
      (google.api.resource_reference) = {
        type: "reporting.halo-cmm.org/EventGroup"
      }
    ];

    // Filter predicate in CEL.
    string value = 2 [(google.api.field_behavior) = REQUIRED];
  }

  // Map of EventGroup to filter predicate.
  repeated EventGroupFilter event_group_filters = 2
      [(google.api.field_behavior) = REQUIRED];

  enum Metric {
    METRIC_UNSPECIFIED = 0;
    REACH = 1;
    FREQUENCY_HISTOGRAM = 2;
    REACH_CURVE = 3;
    IMPRESSION_COUNT = 4;
    WATCH_DURATION = 5;
  }
  repeated Metric metrics = 3 [(google.api.field_behavior) = REQUIRED];

  oneof time {
    TimeInterval time_interval = 4;
    RepeatedTimeInterval repeated_time_interval = 5;
  }

  // Represents a binary set operation.
  message SetOperation {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      UNION = 1;
      DIFFERENCE = 2;
      INTERSECTION = 3;
    }
    Type type = 1 [(google.api.field_behavior) = REQUIRED];

    message SetSpec {
      // The name of the set for display purposes.
      //
      // e.g. this may be a column or row header in CSV output.
      string display_name = 1 [(google.api.field_behavior) = REQUIRED];

      // Set of EventGroup resource names.
      repeated string event_groups = 2 [
        (google.api.resource_reference).type =
            "reporting.halo-cmm.org/EventGroup",
        (google.api.field_behavior) = REQUIRED
      ];

      // CEL filter predicate that applies to all `event_groups`.
      //
      // This filter and the one in the `event_group_filters` form a conjunction
      // that specifies which impressions are included in this set. If
      // unspecified, evaluates to `true`.
      string filter = 3;
    }

    message Operand {
      oneof operand {
        SetOperation operation = 1;
        SetSpec spec = 2;
      }
    }

    // Left-hand side operand of the operation.
    Operand lhs = 2 [(google.api.field_behavior) = REQUIRED];
    // Right-hand side operand of the operation. If not specified, implies the
    // empty set.
    Operand rhs = 3;
  }
  SetOperation set_operation = 6;
}

// Video engagement template for the test-only `MarketEvent`.
//
// Modeled after market-style video templates that report discretized
// completion / viewability buckets as boolean flags rather than continuous
// metrics. See //src/main/proto/.../market/v1/common.proto for the broader
// motivation behind the `MarketEvent` template.

syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.market.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.market.v1";
option java_multiple_files = true;

message Video {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "video"
    media_type: VIDEO
    display_name: "Video Ad"
    description: "Video ad engagement attributes for MarketEvent."
  };

  bool completed_0_percent_plus = 1
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Completed 0%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool completed_25_percent_plus = 2
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Completed 25%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool completed_50_percent_plus = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Completed 50%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool completed_75_percent_plus = 4
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Completed 75%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool completed_100_percent = 5
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Completed 100%"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];

  bool viewable_0_percent_plus = 6
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 0%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool viewable_50_percent_plus = 7
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 50%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool viewable_100_percent = 8
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 100%"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
}

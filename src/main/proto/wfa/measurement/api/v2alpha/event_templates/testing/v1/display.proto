syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.v1";
option java_multiple_files = true;

// Display ad engagement attributes.
//
// Replaces the `Banner` template of the legacy
// `wfa.measurement.api.v2alpha.event_templates.testing.TestEvent`, whose
// single `viewable` boolean carried no threshold semantics. Viewability is a
// fraction-valued double drawn from a discrete set of valid values (see
// video.proto for the rationale versus threshold booleans).
message Display {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "display"
    display_name: "Display Ad"
    description: "Display ad engagement attributes."
    media_type: DISPLAY
  };

  // Fraction of the ad's pixels that were on screen for at least 1
  // continuous second. Valid values: 0.0, 0.5, 1.0 — 0.5 corresponds to the
  // MRC display viewability standard.
  double viewable_fraction = 1
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable Fraction"
        description: "Fraction of the ad's pixels on screen for at least 1 "
                     "continuous second: 0.0, 0.5 (MRC standard) or 1.0."
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
}

syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.v1";
option java_multiple_files = true;

// Common (population) attributes shared by all media types.
message Common {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "common"
    display_name: "Common"
    description: "Common population attributes about the person reached by "
                 "an event."
  };

  enum Sex {
    SEX_UNSPECIFIED = 0;
    MALE = 1;
    FEMALE = 2;
  }
  Sex sex = 1 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Sex"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];

  enum AgeGroup {
    AGE_GROUP_UNSPECIFIED = 0;
    YEARS_18_TO_34 = 1;
    YEARS_35_TO_54 = 2;
    YEARS_55_PLUS = 3;
  }
  AgeGroup age_group = 2 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Age Group"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];

  enum SocialGradeGroup {
    SOCIAL_GRADE_GROUP_UNSPECIFIED = 0;
    A_B_C1 = 1;
    C2_D_E = 2;
  }
  SocialGradeGroup social_grade_group = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Social Grade"
        population_attribute: true
        reporting_features: FILTERABLE
        reporting_features: GROUPABLE
        version_added: 1
      }];

  // US state or the District of Columbia. A high-cardinality attribute, to
  // exercise grouping and filtering over a large value set.
  enum Region {
    REGION_UNSPECIFIED = 0;
    ALABAMA = 1;
    ALASKA = 2;
    ARIZONA = 3;
    ARKANSAS = 4;
    CALIFORNIA = 5;
    COLORADO = 6;
    CONNECTICUT = 7;
    DELAWARE = 8;
    DISTRICT_OF_COLUMBIA = 9;
    FLORIDA = 10;
    GEORGIA = 11;
    HAWAII = 12;
    IDAHO = 13;
    ILLINOIS = 14;
    INDIANA = 15;
    IOWA = 16;
    KANSAS = 17;
    KENTUCKY = 18;
    LOUISIANA = 19;
    MAINE = 20;
    MARYLAND = 21;
    MASSACHUSETTS = 22;
    MICHIGAN = 23;
    MINNESOTA = 24;
    MISSISSIPPI = 25;
    MISSOURI = 26;
    MONTANA = 27;
    NEBRASKA = 28;
    NEVADA = 29;
    NEW_HAMPSHIRE = 30;
    NEW_JERSEY = 31;
    NEW_MEXICO = 32;
    NEW_YORK = 33;
    NORTH_CAROLINA = 34;
    NORTH_DAKOTA = 35;
    OHIO = 36;
    OKLAHOMA = 37;
    OREGON = 38;
    PENNSYLVANIA = 39;
    RHODE_ISLAND = 40;
    SOUTH_CAROLINA = 41;
    SOUTH_DAKOTA = 42;
    TENNESSEE = 43;
    TEXAS = 44;
    UTAH = 45;
    VERMONT = 46;
    VIRGINIA = 47;
    WASHINGTON = 48;
    WEST_VIRGINIA = 49;
    WISCONSIN = 50;
    WYOMING = 51;
  }
  Region region = 4 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Region"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];

  // Whether the person was signed in to a first-party account when reached.
  // A boolean population attribute, to exercise boolean-valued dimensions.
  bool logged_in = 5 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Logged In"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];
}

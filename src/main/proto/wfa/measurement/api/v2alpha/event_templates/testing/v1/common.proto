syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.v1";
option java_multiple_files = true;

// Common (population) attributes shared by all media types.
//
// Replaces the `Person` template of the legacy
// `wfa.measurement.api.v2alpha.event_templates.testing.TestEvent`, aligned
// with the `Common` template shape used by market event templates (see
// world-federation-of-advertisers/local-market-configuration).
message Common {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "common"
    display_name: "Common"
    description: "Common population attributes about the person reached by "
                 "an event."
  };

  enum Sex {
    SEX_UNSPECIFIED = 0;
    MALE = 1;
    FEMALE = 2;
  }
  Sex sex = 1 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Sex"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];

  // Note: buckets retained from the legacy `Person.AgeGroup` (18–34), which
  // is what the existing population specs stratify on. The Origin UK market
  // template uses 16–34 instead.
  enum AgeGroup {
    AGE_GROUP_UNSPECIFIED = 0;
    YEARS_18_TO_34 = 1;
    YEARS_35_TO_54 = 2;
    YEARS_55_PLUS = 3;
  }
  AgeGroup age_group = 2 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Age Group"
    population_attribute: true
    reporting_features: FILTERABLE
    reporting_features: GROUPABLE
    version_added: 1
  }];

  // Note: not defined by the Origin/Aquila market templates, but retained
  // because the existing QA population specs stratify on it. Markets that do
  // not model social grade simply omit this field from their own templates.
  enum SocialGradeGroup {
    SOCIAL_GRADE_GROUP_UNSPECIFIED = 0;
    A_B_C1 = 1;
    C2_D_E = 2;
  }
  SocialGradeGroup social_grade_group = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Social Grade"
        population_attribute: true
        reporting_features: FILTERABLE
        reporting_features: GROUPABLE
        version_added: 1
      }];
}

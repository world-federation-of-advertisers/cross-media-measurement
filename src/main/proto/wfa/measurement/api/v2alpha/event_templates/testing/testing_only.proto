// Test-only event template that exists solely to exercise code paths which
// require IMPRESSION_QUALIFICATION-tagged fields of specific proto types
// (STRING, FLOAT) that are not present in the production-shape event
// templates. DO NOT MIMIC this template or add fields like these to real EDP
// schemas.
//
// General guidance for real EDP schemas:
//   - Prefer enums over strings for IMPRESSION_QUALIFICATION fields. Enums
//     give a bounded, self-documenting value space and round-trip through
//     CEL as integers, avoiding CEL string-literal quoting and escaping
//     concerns.
//   - Prefer enums or discretized bool buckets (like MarketEvent's
//     `viewable_50_percent_plus`) over continuous floats. Continuous values
//     force CEL comparisons that are noise-fragile and require careful
//     handling of NaN / Infinity.
//
// media_type is set to OTHER so this template does not participate in
// DISPLAY-scoped or VIDEO-scoped IQF template inclusion, keeping its
// presence invisible to any real IQF path.
//
// See issue #4148 for the underlying toCelValue quoting / NaN-Infinity
// concerns these fields exercise.

syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing;

import "wfa/measurement/api/v2alpha/event_annotations.proto";
import "wfa/measurement/api/v2alpha/media_type.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing";
option java_multiple_files = true;

message TestingOnly {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "testing_only"
    display_name: "Testing-Only Template (DO NOT MIMIC)"
    description: "Test-only STRING and FLOAT IMPRESSION_QUALIFICATION fields for CEL code paths. Do not mimic in real EDP schemas."
    media_type: OTHER
  };

  // Test-only STRING IMPRESSION_QUALIFICATION field. Do not mimic. See
  // top-of-file guidance -- prefer enums over strings for
  // IMPRESSION_QUALIFICATION fields in real EDP schemas.
  string testing_string = 1 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Testing String (test-only, DO NOT MIMIC)"
    reporting_features: IMPRESSION_QUALIFICATION
    version_added: 1
  }];

  // Test-only FLOAT IMPRESSION_QUALIFICATION field. Do not mimic. See
  // top-of-file guidance -- prefer enums or bool buckets over continuous
  // floats for IMPRESSION_QUALIFICATION fields in real EDP schemas.
  float testing_float = 2 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Testing Float (test-only, DO NOT MIMIC)"
    reporting_features: IMPRESSION_QUALIFICATION
    version_added: 1
  }];

  // Test-only STRING FILTERABLE + POPULATION_ATTRIBUTE field, separate from
  // testing_string so the DimensionSpec (dimension_spec.filters) path can be
  // exercised end-to-end against the same toCelValue STRING_VALUE branch that
  // testing_string exercises via IQF. Do not mimic.
  string testing_string_filterable = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Testing Filterable String (test-only, DO NOT MIMIC)"
        reporting_features: FILTERABLE
        version_added: 1
      }];

  // Nested message used as an member of `testing_oneof` below. Exercises
  // EventMessageDescriptor's oneof-member descent + BasicReportTransformations'
  // nested-path null-guard emission via the IQF (impression_qualification)
  // code path. DO NOT MIMIC.
  message TestingArmIqf {
    enum TestingArmIqfEnum {
      TESTING_ARM_IQF_ENUM_UNSPECIFIED = 0;
      ARM_IQF_1 = 1;
      ARM_IQF_2 = 2;
    }
    TestingArmIqfEnum testing_arm_iqf_enum = 1
        [(.wfa.measurement.api.v2alpha.template_field) = {
          display_name: "Testing Member IQF Enum (test-only, DO NOT MIMIC)"
          reporting_features: IMPRESSION_QUALIFICATION
          version_added: 1
        }];
  }

  // Nested message used as an member of `testing_oneof` below. Exercises the
  // same oneof-member descent + null-guard emission via the DimensionSpec
  // (dimension_spec.filters / dimension_spec.grouping) code path. DO NOT
  // MIMIC.
  message TestingArmFilterable {
    enum TestingArmFilterableEnum {
      TESTING_ARM_FILTERABLE_ENUM_UNSPECIFIED = 0;
      ARM_FILT_1 = 1;
      ARM_FILT_2 = 2;
    }
    TestingArmFilterableEnum testing_arm_filterable_enum = 1 [
      (.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Testing Member Filterable Enum (test-only, DO NOT MIMIC)"
        reporting_features: FILTERABLE
        version_added: 1
      }
    ];
  }

  // Nested message used as an member of `testing_oneof` below. Exercises the
  // same oneof-member descent + null-guard emission via the DimensionSpec
  // grouping (dimension_spec.grouping.eventTemplateFields) code path,
  // which turns each enum value into a separate CEL predicate. DO NOT
  // MIMIC.
  message TestingArmGroupable {
    enum TestingArmGroupableEnum {
      TESTING_ARM_GROUPABLE_ENUM_UNSPECIFIED = 0;
      ARM_GRP_1 = 1;
      ARM_GRP_2 = 2;
    }
    TestingArmGroupableEnum testing_arm_groupable_enum = 1 [
      (.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Testing Member Groupable Enum (test-only, DO NOT MIMIC)"
        reporting_features: GROUPABLE
        version_added: 1
      }
    ];
  }

  // Test-only oneof mirroring the `Common.oneof edp_specific` pattern
  // real market templates use (production deployments) to expose EDP-specific
  // event fields. Three members so IQF-side, DimensionSpec-filter-side, and
  // DimensionSpec-grouping-side tests each address a distinct nested path
  // without either poisoning the other's assertion shape. All members
  // inherit TestingOnly's OTHER media_type. DO NOT MIMIC.
  oneof testing_oneof {
    TestingArmIqf testing_arm_iqf = 4;
    TestingArmFilterable testing_arm_filterable = 5;
    TestingArmGroupable testing_arm_groupable = 6;
  }
}

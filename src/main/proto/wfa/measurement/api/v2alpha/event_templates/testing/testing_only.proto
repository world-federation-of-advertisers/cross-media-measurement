// Test-only event template that exists solely to exercise code paths which
// require IMPRESSION_QUALIFICATION-tagged fields of specific proto types
// (STRING, FLOAT) that are not present in the production-shape event
// templates. DO NOT MIMIC this template or add fields like these to real EDP
// schemas.
//
// General guidance for real EDP schemas:
//   - Prefer enums over strings for IMPRESSION_QUALIFICATION fields. Enums
//     give a bounded, self-documenting value space and round-trip through
//     CEL as integers, avoiding CEL string-literal quoting and escaping
//     concerns.
//   - Prefer enums over families of related booleans. If several bool
//     fields name mutually-exclusive categories (`is_video` / `is_display`
//     / `is_native`), they should be a single enum instead. Booleans
//     remain the right choice when they describe independent capability
//     flags that can each be true or false without implying anything
//     about the others (e.g. `has_audio`, `served_via_ssl`).
//   - Prefer floats over families of conditional-threshold booleans. A
//     single `float completion_ratio` in [0, 1] supports CEL expressions
//     like `video.completion_ratio >= 0.5` and doesn't fragment one
//     measurement into related fields (e.g. `completed_25`,
//     `completed_50`, `completed_75`). Any family of thresholds
//     describing the same underlying continuous measurement at different
//     cut-points should be a single float. FLOAT_VALUE rejects NaN and
//     Infinity at both mapping validation and CEL emission (#4148), so
//     continuous floats are safe.
//
// media_type is set to OTHER so this template does not participate in
// DISPLAY-scoped or VIDEO-scoped IQF template inclusion, keeping its
// presence invisible to any real IQF path.
//
// See issue #4148 for the underlying toCelValue quoting / NaN-Infinity
// concerns these fields exercise.

syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing;

import "wfa/measurement/api/v2alpha/event_annotations.proto";
import "wfa/measurement/api/v2alpha/media_type.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing";
option java_multiple_files = true;

message TestingOnly {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "testing_only"
    display_name: "Testing-Only Template (DO NOT MIMIC)"
    description: "Test-only STRING and FLOAT IMPRESSION_QUALIFICATION fields for CEL code paths. Do not mimic in real EDP schemas."
    media_type: OTHER
  };

  // Test-only STRING IMPRESSION_QUALIFICATION field. Do not mimic. See
  // top-of-file guidance -- prefer enums over strings for
  // IMPRESSION_QUALIFICATION fields in real EDP schemas.
  string testing_string = 1 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Testing String (test-only, DO NOT MIMIC)"
    reporting_features: IMPRESSION_QUALIFICATION
    version_added: 1
  }];

  // Test-only FLOAT IMPRESSION_QUALIFICATION field. Exercises the FLOAT
  // CEL emission code path (numeric literal, NaN/Infinity rejection).
  // See top-of-file guidance: floats ARE the right shape for continuous
  // measurements in real EDP schemas.
  float testing_float = 2 [(.wfa.measurement.api.v2alpha.template_field) = {
    display_name: "Testing Float (test-only, DO NOT MIMIC)"
    reporting_features: IMPRESSION_QUALIFICATION
    version_added: 1
  }];

  // Test-only STRING FILTERABLE + POPULATION_ATTRIBUTE field, separate from
  // testing_string so the DimensionSpec (dimension_spec.filters) path can be
  // exercised end-to-end against the same toCelValue STRING_VALUE branch that
  // testing_string exercises via IQF. Do not mimic.
  string testing_string_filterable = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Testing Filterable String (test-only, DO NOT MIMIC)"
        reporting_features: FILTERABLE
        version_added: 1
      }];
}

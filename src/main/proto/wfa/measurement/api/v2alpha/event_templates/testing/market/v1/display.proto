// Display engagement template for the test-only `MarketEvent`.
//
// Mirrors the discretized boolean modeling style used by some markets for
// display ad viewability (separate fields per viewability bucket, instead of
// a single continuous metric). See //src/main/proto/.../market/v1/common.proto
// for the broader motivation behind the `MarketEvent` template.

syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.market.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.market.v1";
option java_multiple_files = true;

message Display {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "display"
    media_type: DISPLAY
    display_name: "Display Ad"
    description: "Display ad engagement attributes for MarketEvent."
  };

  bool viewable_0_percent_plus = 1
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 0%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool viewable_50_percent_plus = 2
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 50%+"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
  bool viewable_100_percent = 3
      [(.wfa.measurement.api.v2alpha.template_field) = {
        display_name: "Viewable 100%"
        reporting_features: IMPRESSION_QUALIFICATION
        version_added: 1
      }];
}

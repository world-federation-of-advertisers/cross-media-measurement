syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";
import "wfa/measurement/api/v2alpha/event_templates/testing/v1/common.proto";
import "wfa/measurement/api/v2alpha/event_templates/testing/v1/display.proto";
import "wfa/measurement/api/v2alpha/event_templates/testing/v1/other.proto";
import "wfa/measurement/api/v2alpha/event_templates/testing/v1/video.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.v1";
option java_multiple_files = true;

// Test event message, structured as a reference for the event templates
// that individual markets define (see
// world-federation-of-advertisers/local-market-configuration): a single
// `Common` template carrying population attributes, plus one engagement
// template per `MediaType`.
//
// It deliberately departs from the market templates in one way: completion
// and viewability are fraction-valued doubles with a discrete set of valid
// values, not families of conditional-threshold booleans (see video.proto).
//
// Replaces `wfa.measurement.api.v2alpha.event_templates.testing.TestEvent`
// (`Person` → `Common`, `Banner` → `Display`, new `Other`, no
// `TestingOnly`).
message TestEvent {
  option (.wfa.measurement.api.v2alpha.event) = {
    current_version: 1
  };

  Common common = 1;
  Video video = 2;
  Display display = 3;
  Other other = 4;
}

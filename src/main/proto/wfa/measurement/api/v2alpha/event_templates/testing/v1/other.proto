syntax = "proto3";

package wfa.measurement.api.v2alpha.event_templates.testing.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_templates.testing.v1";
option java_multiple_files = true;

// Template for media types other than Video and Display, completing the
// `MediaType` surface of the event. Events with `MediaType.NATIVE` are also
// covered by this template rather than a dedicated one.
message Other {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "other"
    display_name: "Other Media Type"
    description: "Attributes for media types other than Video and Display."
    media_type: OTHER
  };
}

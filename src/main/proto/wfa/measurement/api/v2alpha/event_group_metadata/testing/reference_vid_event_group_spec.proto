syntax = "proto3";

package wfa.measurement.api.v2alpha.event_group_metadata.testing;

import "google/type/date.proto";
import "wfa/measurement/api/v2alpha/event_group_metadata/testing/simulator_synthetic_data_spec.proto";

option java_package = "org.wfanet.measurement.api.v2alpha.event_group_metadata.testing";
option java_multiple_files = true;

// Specification for generating synthetic events by running reference VIDs
// through a VID labeler model.
//
// Instead of specifying VID ranges directly (as in `SyntheticEventGroupSpec`),
// this spec defines reference VID ranges with demographic distributions. Each
// reference VID is converted to a string and passed through a VID labeler
// model, which assigns VIDs via hash-based routing and a demographic correction
// matrix.
message ReferenceVidEventGroupSpec {
  // A range of reference VIDs (inclusive start, exclusive end).
  message IdRange {
    int64 start = 1;
    int64 end_exclusive = 2;
  }

  // Assigns demographics and frequency to a range of reference VIDs.
  //
  // Each reference VID in the range is converted to a string (`id.toString()`)
  // and used as `event_id.id` for the labeler. Demographics are set on the
  // labeler reference VID's
  // `proprietary_id_space_1_user_info.demo.demo_bucket`.
  message DemographicDistribution {
    IdRange id_range = 1;

    // Gender enum value (wfa_virtual_people.Gender: 1=MALE, 2=FEMALE).
    int32 gender = 2;

    int32 min_age = 3;
    int32 max_age = 4;

    // Total frequency for each reference VID in this distribution over the
    // containing date range.
    int64 frequency = 5;

    // Non-population field values for events in this distribution (e.g.
    // viewability flags). Same key format as
    // .
    map<string, FieldValue> non_population_field_values = 6;
  }

  // Date range and demographic distributions for event generation.
  message DateSpec {
    message DateRange {
      google.type.Date start = 1;
      google.type.Date end_exclusive = 2;
    }

    DateRange date_range = 1;

    // Demographic distributions with per-distribution frequency.
    repeated DemographicDistribution demographic_distributions = 2;
  }

  // Date ranges with their demographic distributions.
  repeated DateSpec date_specs = 1;

  // Non-population field values applied to all generated events (e.g.
  // viewability flags). Same key format as
  // `SyntheticEventGroupSpec.FrequencySpec.VidRangeSpec.non_population_field_values`.
  map<string, FieldValue> non_population_field_values = 2;
}

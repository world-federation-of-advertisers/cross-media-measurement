syntax = "proto3";

package wfa.measurement.config.edpaggregator;

import "wfa/measurement/config/edpaggregator/storage_params.proto";
import "wfa/measurement/config/edpaggregator/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.config.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "DataAvailabilityMonitorConfigProto";

// Configuration for a monitored model line.
message ModelLineConfig {
  // Model line resource name.
  // Format:
  //   "modelProviders/{model_provider}/modelSuites/{model_suite}/modelLines/{model_line}"
  string model_line = 1;
}

// Configuration for a single monitored EDP impression path.
message DataAvailabilityMonitorConfig {
  // Storage backend where the impressions are stored.
  StorageParams storage = 1;

  // Base path for EDP impressions
  // (e.g., "edp/edp1/vid-labeled-impressions").
  string edp_impression_path = 2;

  // Model lines to monitor and their storage paths.
  repeated ModelLineConfig model_line_configs = 3;

  // Maximum number of days a model line can go without an upload before
  // being considered stale. Defaults to 3 if not set.
  int32 max_stale_days = 4;

  // IANA time zone ID used to determine "today" for staleness checks
  // (e.g., "UTC", "America/New_York").
  string time_zone = 5;

  // Configuration for checking deleted ImpressionMetadata entries whose
  // blobs still exist on the bucket (spurious deletions).
  SpuriousDeletionCheckConfig spurious_deletion_check = 6;
}

// Configuration for the spurious deletion reconciliation check.
message SpuriousDeletionCheckConfig {
  // Whether to enable the spurious deletion check. When false or unset,
  // the check is skipped entirely.
  bool enabled = 1;

  // Number of days of deleted entries to check. Only entries with
  // interval_start within the last `lookback_days` will be queried.
  // Must be > 0 when enabled.
  int32 lookback_days = 2;

  // Resource name of the data provider.
  // Format: "dataProviders/{data_provider}"
  string data_provider_name = 3;

  // How to connect to the ImpressionMetadata service.
  TransportLayerSecurityParams impression_metadata_connection = 4;
}

// Wrapper containing monitor configurations. Loaded at startup from the
// EDPA config bucket.
message DataAvailabilityMonitorConfigs {
  // Monitored EDP impression paths. Each entry monitors a separate
  // storage location and set of model lines.
  repeated DataAvailabilityMonitorConfig configs = 1;
}

syntax = "proto3";

package wfa.measurement.config.edpaggregator;

import "wfa/measurement/config/edpaggregator/storage_params.proto";

option java_package = "org.wfanet.measurement.config.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "DataAvailabilityMonitorConfigProto";

// Configuration for a single monitored EDP impression path.
message DataAvailabilityMonitorConfig {
  // Where the impressions are stored.
  StorageParams storage = 1;

  // Base path for EDP impressions
  // (e.g., "edp/meta/vid-labeled-impressions").
  string edp_impression_path = 2;

  // Model line IDs that are expected to upload daily. Only these model lines
  // will be checked for staleness and gaps.
  repeated string active_model_lines = 3;

  // Maximum number of days a model line can go without an upload before
  // being considered stale. Defaults to 3 if not set.
  int32 max_stale_days = 4;
}

// Wrapper containing monitor configurations. Loaded at startup from the
// EDPA config bucket.
message DataAvailabilityMonitorConfigs {
  // All the monitored EDP impression paths. Each entry monitors a separate
  // storage location and set of model lines.
  repeated DataAvailabilityMonitorConfig configs = 1;
}

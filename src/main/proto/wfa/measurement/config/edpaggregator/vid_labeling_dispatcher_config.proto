syntax = "proto3";

package wfa.measurement.config.edpaggregator;

import "google/api/resource.proto";
import "wfa/measurement/config/edpaggregator/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.config.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "VidLabelingDispatcherConfigProto";

// Static configuration for the VID Labeling Dispatcher cloud function.
// Loaded once at startup from a config blob.
message VidLabelingDispatcherConfig {
  // The CMMS resource name of the DataProvider.
  string data_provider = 1
      [(google.api.resource_reference).type = "halo.wfanet.org/DataProvider"];

  // Storage configuration for labeled impression output.
  message StorageParams {
    // The Google Cloud Storage project ID for the storage instance.
    string gcs_project_id = 1;

    // The blob URI prefix where labeled impressions will be stored in
    // Google Cloud Storage once generated by the app for a given EDP.
    string labeled_impressions_blob_prefix = 2;
  }

  // The storage used by the TEE app for labeled impression output.
  StorageParams storage_params = 2;

  // TLS connection params for the VID repository API.
  TransportLayerSecurityParams vid_repo_connection = 3;

  // Configuration for a model line.
  message ModelLineConfig {
    // Mapping from labeler input field names to their corresponding values.
    map<string, string> labeler_input_field_mapping = 1;

    // Mapping from event template field names to their corresponding values.
    map<string, string> event_template_field_mapping = 2;
  }

  // Map from model line resource name to its configuration.
  map<string, ModelLineConfig> model_line_configs = 4;

  // Optional; if provided, indicates what model lines to use.
  repeated string override_model_lines = 5
      [(google.api.resource_reference).type = "halo.wfanet.org/ModelLine"];

  // TLS connection params for the RawImpressionMetadata storage service.
  TransportLayerSecurityParams raw_impression_metadata_storage_connection = 6;

  // Maximum batch size in bytes. If unset, treated as a single batch.
  optional fixed64 batch_max_size = 7;
}

// Wrapper for a list of VidLabelingDispatcherConfig messages.
// Used for loading multiple per-EDP configs from a single config blob.
message VidLabelingDispatcherConfigs {
  repeated VidLabelingDispatcherConfig configs = 1;
}

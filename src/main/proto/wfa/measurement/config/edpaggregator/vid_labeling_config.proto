syntax = "proto3";

package wfa.measurement.config.edpaggregator;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "wfa/measurement/config/edpaggregator/storage_params.proto";
import "wfa/measurement/config/edpaggregator/transport_layer_security_params.proto";

option java_package = "org.wfanet.measurement.config.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "VidLabelingConfigProto";

// Static config for the Cloud Function dispatcher. Used to construct the
// VidLabelerParams passed to the Secure Computation API.
message VidLabelingConfig {
  // The CMMS resource name for the EDP.
  string data_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "halo.wfanet.org/DataProvider"
  ];

  // Storage for raw impressions read by the TEE app.
  StorageParams raw_impressions_storage_params = 2
      [(google.api.field_behavior) = REQUIRED];

  // Storage for VID-labeled impressions written by the TEE app.
  StorageParams vid_labeled_impressions_storage_params = 3
      [(google.api.field_behavior) = REQUIRED];

  // Connection used by TEE App to access the VID Repo.
  TransportLayerSecurityParams vid_repo_connection = 4
      [(google.api.field_behavior) = REQUIRED];

  // Message representing the configuration for a model line.
  message ModelLineConfig {
    // Mapping from labeler input field names to their corresponding values.
    map<string, string> labeler_input_field_mapping = 1;

    // Mapping from event template field names to their corresponding values.
    map<string, string> event_template_field_mapping = 2;
  }

  // Map from model line resource name to its configuration.
  map<string, ModelLineConfig> model_line_configs = 5
      [(google.api.field_behavior) = REQUIRED];

  // Optional; if provided, indicates what model lines to use.
  repeated string override_model_lines = 6 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference).type = "halo.wfanet.org/ModelLine"
  ];

  // Cloud Function TLS connection params for the RawImpressionMetadata
  // storage service.
  TransportLayerSecurityParams raw_impression_metadata_storage_connection = 7
      [(google.api.field_behavior) = REQUIRED];

  // Maximum batch size in bytes for partitioning raw impression files.
  // If unset, defaults to 10 GB (10000000000 bytes).
  int64 max_batch_size_bytes = 8 [(google.api.field_behavior) = OPTIONAL];

  // KMS configuration for a specific cloud provider.
  message KmsConfig {
    // WIF credential audience as workload identity pool provider.
    string kms_audience = 1 [(google.api.field_behavior) = REQUIRED];

    // GCP-specific KMS configuration.
    message GcpKmsConfig {
      // Service account with KMS access.
      string service_account = 1 [(google.api.field_behavior) = REQUIRED];
    }

    // AWS-specific KMS configuration, federated through GCP.
    message AwsKmsConfig {
      // GCP service account used for identity federation to AWS.
      string service_account = 1 [(google.api.field_behavior) = REQUIRED];

      // AWS IAM role ARN to assume via GCP identity federation.
      string role_arn = 2 [(google.api.field_behavior) = REQUIRED];

      // Identifier for the assumed AWS role session.
      string role_session_name = 3 [(google.api.field_behavior) = REQUIRED];

      // AWS region for STS and KMS endpoints.
      string region = 4 [(google.api.field_behavior) = REQUIRED];

      // OIDC audience for the GCP ID token presented to AWS IAM.
      string audience = 5 [(google.api.field_behavior) = REQUIRED];
    }

    oneof provider {
      GcpKmsConfig gcp = 2;
      AwsKmsConfig aws = 3;
    }
  }

  // KMS config for decrypting raw impression data.
  KmsConfig raw_impressions_kms_config = 9 [(google.api.field_behavior) = REQUIRED];

  // KMS config for encrypting VID-labeled impression output.
  KmsConfig vid_labeled_impressions_kms_config = 10
      [(google.api.field_behavior) = REQUIRED];
}

// Wrapper containing VID Labeling configurations for all EDPs.
// Loaded at startup from the EDPA config bucket.
message VidLabelingConfigs {
  // All the per-EDP VID Labeling configs. Each entry must have a unique
  // `data_provider` value.
  repeated VidLabelingConfig configs = 1;
}

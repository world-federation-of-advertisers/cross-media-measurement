syntax = "proto3";

package wfa.measurement.config.edpaggregator;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";

option java_package = "org.wfanet.measurement.config.edpaggregator";
option java_multiple_files = true;
option java_outer_classname = "DataProviderValidationConfigProto";

// Static configuration for all DataProvider impression validation.
message DataProviderValidationConfigs {
  // Per-DataProvider validation configurations. At most one entry per
  // `data_provider`; the loader enforces uniqueness.
  repeated DataProviderValidationConfig configs = 1;
}

// Per-DataProvider validation configuration.
message DataProviderValidationConfig {
  // Resource name of the `DataProvider` this configuration applies to.
  string data_provider = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "halo.wfanet.org/DataProvider"
  ];

  // HTTP endpoint for the DataProvider's validation cloud function.
  HttpEndpointSink endpoint = 2 [(google.api.field_behavior) = REQUIRED];

  // Tolerance thresholds for deviation evaluation.
  ToleranceConfig tolerance = 3 [(google.api.field_behavior) = REQUIRED];

  // Timeout for the cloud function call.
  google.protobuf.Duration request_timeout = 4
      [(google.api.field_behavior) = REQUIRED];

  // Action to take when the publisher returned a comparable count AND it
  // exceeded the failure threshold. Skipped responses (see
  // `DataProviderImpressionQueryResponse.SkipReason`) are always logged and
  // never fail the report, regardless of this setting.
  FailurePolicy failure_policy = 5;
}

// HTTP endpoint configuration for a DataProvider's cloud function.
message HttpEndpointSink {
  // HTTPS endpoint URI of the cloud function.
  string endpoint_uri = 1 [(google.api.field_behavior) = REQUIRED];
}

// Tolerance thresholds for deviation between reported and publisher values.
message ToleranceConfig {
  // Deviation fraction that triggers a warning. Severe telemetry is emitted
  // but the report continues. Default: 0.02 (2%).
  double warning_threshold_fraction = 1;

  // Deviation fraction that triggers a failure. May fail the report per
  // `FailurePolicy`. Must be >= `warning_threshold_fraction`.
  // Default: 0.10 (10%).
  double failure_threshold_fraction = 2;

  // Minimum impression count below which validation is skipped to avoid
  // false failures on small campaigns. Default: 1000.
  int64 minimum_impression_count = 3;
}

// Action to take when validation exceeds the failure threshold.
enum FailurePolicy {
  FAILURE_POLICY_UNSPECIFIED = 0;

  // Log and emit telemetry. Report continues to noise correction.
  LOG_ONLY = 1;

  // Fail the report by transitioning to INVALID.
  FAIL_REPORT = 2;
}

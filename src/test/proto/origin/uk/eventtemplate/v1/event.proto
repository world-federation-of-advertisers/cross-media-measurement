// Test-only mirror of the Origin UK Event message from
// https://github.com/world-federation-of-advertisers/local-market-configuration/tree/main/origin/uk/eventtemplate/v1.

syntax = "proto3";

package halo_cmm.origin.uk.eventtemplate.v1;

import "origin/uk/eventtemplate/v1/common.proto";
import "origin/uk/eventtemplate/v1/display.proto";
import "origin/uk/eventtemplate/v1/other.proto";
import "origin/uk/eventtemplate/v1/video.proto";
import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.halo_cmm.origin.uk.eventtemplate.v1";
option java_multiple_files = true;

message Event {
  option (.wfa.measurement.api.v2alpha.event) = {
    current_version: 1
  };

  Common common = 1;
  Video video = 2;
  Display display = 3;
  Other other = 4;
}

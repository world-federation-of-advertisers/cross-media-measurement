// Test-only mirror of the Origin UK Other event template from
// https://github.com/world-federation-of-advertisers/local-market-configuration/tree/main/origin/uk/eventtemplate/v1.

syntax = "proto3";

package halo_cmm.origin.uk.eventtemplate.v1;

import "wfa/measurement/api/v2alpha/event_annotations.proto";

option java_package = "org.halo_cmm.origin.uk.eventtemplate.v1";
option java_multiple_files = true;

message Other {
  option (.wfa.measurement.api.v2alpha.event_template) = {
    name: "other"
    media_type: OTHER
    display_name: "Other Media Type Template"
    description: "A template for other media types for Origin Event filtering."
  };
}
